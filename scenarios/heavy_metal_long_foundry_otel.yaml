# heavy_metal / long_foundry — WWN combat + magic OTEL playtest (story 87-4 AC5).
# Second world: confirms the long_foundry overlay (its ADR-126 magic-plugin
# instantiation) does not clobber the wwn ruleset binding, and that combat +
# spellcasting fire mechanically here too. Pact-born caster — on-theme for the
# Coil-and-Brand pact-magic city.
# Run: just playtest-scenario heavy_metal_long_foundry_otel

name: Heavy Metal Long Foundry WWN OTEL
genre: heavy_metal
world: long_foundry

character:
  strategy: auto
  class: Pact-born   # caster Calling — cast_spell beat is class-gated to casters

actions:
  - "look around and take the measure of this place"
  - "check what I am carrying and what I can bring to bear"
  - "find someone hostile — I am looking for a fight"
  - "draw my blade and strike the nearest enemy"
  - "keep fighting, press the attack with my weapon"
  - "work a prepared spell against my enemy — spend the Effort"
  - "cast again, push the working harder even as it costs me"
  - "strike a finishing blow"
  - "check my wounds and how much the workings have taken from me"
  - "loot the body for anything of worth"
