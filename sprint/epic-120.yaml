  - id: 120-4
    title: "World-tier equipment_tables override — loader + CharacterBuilder per-slot merge (enables caverns/road_warrior verbatim chargen): add a World.equipment_tables field + load worlds/<w>/equipment_tables.yaml + merge world-over-genre at chargen (per-slot APPEND within each class kit; world guaranteed_grants append by kit_id). ADDITIVE — no-op for any pack/world shipping no world equipment_tables.yaml. Fixture-tested in the server repo. Enables 120-1's caverns genre-kit split (and likely 120-2 road_warrior). Merge semantics per Keith's Option-B ruling 2026-06-15."
    description: "ADR-140 layering for chargen kits. PROBLEM: caverns (and likely road_warrior) verbatim sweeps move no-SRD-analog dungeon items to the world tier, but the genre equipment_tables.yaml class_tables + guaranteed_grants reference them — so genre kits must go SRD-pure and the world must re-add the flavor. There is no world-tier equipment_tables today. SOLUTION (Keith Option-B, 2026-06-15): World model gains an optional equipment_tables field; loader loads worlds/<w>/equipment_tables.yaml; CharacterBuilder merges world-over-genre. MERGE SEMANTICS: per-slot APPEND within each class kit (genre slot items first, then the world's), and guaranteed_grants APPEND by kit_id. ADDITIVE: a world that ships no equipment_tables.yaml is a pure no-op (genre kits unchanged) — this is why it lands green on its own. Builder seam: builder.py uses self._equipment_tables (genre); needs the world's merged in (chargen already has world_slug — see chargen_mixin.py:1242 / resolve_inventory precedent). FIXTURE-TESTED in server (synthetic WWN pack + world). Caverns CONTENT split + the ~6 caverns chargen-test updates ride on this in 120-1. Cross-ref: ADR-140 (world owns the catalog), ADR-121 (layered resolution), session .session/120-1-session.md 'Dev note' for the full plan."
    points: 5
    priority: p2
    status: done
    started: '2026-06-15'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - World model gains an optional equipment_tables field; the loader populates it from worlds/<w>/equipment_tables.yaml when present and leaves it None when absent (additive; no behavior change for worlds without one).
      - "CharacterBuilder merges the world's equipment_tables over the genre's at chargen: per-slot APPEND within each class kit (genre items, then world items), and guaranteed_grants append by kit_id. A world with no equipment_tables.yaml is a verified no-op (genre kits identical to today)."
      - 'Fixture-tested in the server repo: a synthetic WWN pack + world WITH a world equipment_tables.yaml proves the merge fires at chargen (rolled kit includes the world-tier slot items + grants); a sibling world WITHOUT one is unchanged.'
      - 'OTEL: chargen emits a span attribute when the world-equipment_tables merge fires (OTEL Observability Principle — the GM panel can confirm the world override engaged).'
      - Full server suite green; existing genre-only chargen tests (test_chargen_dispatch, test_cc_class_kits, etc.) are NOT broken by the additive capability — caverns-specific updates are 120-1's job.
    completed: '2026-06-15'
    review_verdict: approved
