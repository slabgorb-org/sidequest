id: '120'
type: epic
title: SRD-bound genre baselines go fully verbatim (caverns_and_claudes + road_warrior unprovenanced sweep; upgrade D3 validator to verbatim-only)
description: "Follow-on to 114-14 (Keith ruled 2026-06-15: narrow 114-14 to the declared-bespoke packs, file the rest as an epic). 114-14 added a fail-loud validator rejecting genre-tier mode:bespoke for WN-family packs and cleaned the 3 declared-bespoke packs (mutant_wasteland/neon_dystopia/road_warrior). But the REAL ADR-145 D3 rule is 'SRD-bound genre baseline = verbatim-only', and two WN-family packs still carry UNPROVENANCED (neither verbatim nor flagged-bespoke) genre items: caverns_and_claudes (31, WWN) and road_warrior (25, CWN — rig parts, mount weapons, survival gear, rig-tier vessels). This epic: (1) source each unprovenanced item verbatim from its SRD at the genre tier where an analog exists (the elemental_harmony/heavy_metal pattern — both already 100% WWN-verbatim), moving only genuinely-unique items (rig-tier vessels, plot devices) to the world tier; (2) UPGRADE the 114-14 validator from 'no genre-tier bespoke' to 'WN-family genre baseline must be mode:verbatim (or derived)'. elemental_harmony + heavy_metal already pass; space_opera has no genre inventory; native packs (pulp_noir/tea_and_murder/wry_whimsy/spaghetti_western) are exempt (no SRD to be verbatim from). Watch the world-replaces-genre starting_equipment/gold/currency trap when creating any world inventory.yaml."
priority: p2
status: backlog
repos: content,server
stories:
  - id: 120-1
    title: 'caverns_and_claudes (WWN) genre baseline -> 100% verbatim: source the 31 unprovenanced genre item_catalog items from the WWN SRD at the genre tier where an analog exists (mode=verbatim, srd=wwn, license=wn-free, srd_ref -- the elemental_harmony/heavy_metal pattern, both already 100% WWN-verbatim). MOVE genuinely-unique items with no WWN analog (plot devices) to the world tier as honest mode=bespoke (the mutant_wasteland rad_pills/geiger precedent), logging each as a deviation. WARN world-replaces-genre kit trap: any NEW worlds/<w>/inventory.yaml MUST copy genre starting_equipment/starting_gold/currency verbatim or classes ship empty kits. Verify resolve_inventory(pack, world) resolves every kit id across caverns worlds. Does NOT touch the validator (that is 120-3).'
    description: "BLOCKED on 120-4 (world-tier equipment_tables override) — re-scoped 2026-06-15 after Dev hit the chargen cascade; Keith ruled Option B. WIP already on branch feat/120-1-caverns-wwn-verbatim-baseline (uncommitted in content; TEA's 5 RED tests committed in server): genre inventory.yaml is 100% WWN-verbatim (20 dup deletes + Delver kit repoint), and worlds/beneath_sunden/inventory.yaml created (11 bespoke items + kit-trap copies). REMAINING (rides on 120-4's capability): (1) genre equipment_tables.yaml -> SRD-pure (repoint 17 to wwn_*, drop the 7 world items + the genre potion grant); (2) NEW worlds/beneath_sunden/equipment_tables.yaml (dungeon-flavor kit slots + guaranteed_grants potion); (3) update the ~6 caverns chargen tests pinned to legacy ids (test_106_1_caverns_armor_content, test_cc_class_kits, test_cc_chargen_e2e, test_chargen_dispatch, test_chargen_persist_and_play, the equipment_tables wiring test). Full plan + decision: .session/120-1-session.md (Dev note). RESUME after 120-4 merges. Original scope (genre item_catalog verbatim) unchanged in the title above."
