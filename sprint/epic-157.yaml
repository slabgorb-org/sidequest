id: '157'
type: epic
title: Faction/zone-scoped content eligibility
description: "Multi-region worlds leak content across zones: the Monster Manual (ADR-059) seeds creatures with no location_tags so they are eligible EVERYWHERE, and format_area_creatures does ZERO location filtering — so a 4th-voyage Yahoo surfaces on the 1st-voyage Lilliput shore (wry_whimsy/gulliver, session 2026-06-20-gulliver-e721409c). Applies to oz (4 countries + Emerald City), road_warrior/the_circuit (subculture territories), wonderland, and any multi-region/faction world. Direction (Keith, 2026-06-20): group locations by faction; scope content-eligibility by the region's faction-group (region -> faction-group -> eligible NPC/creature/trope pools). Reuse-first: regions already carry controlled_by:<faction>; the Monster Manual has location_tags + culture + available_at_location(); cartography entities home NPCs. Design-first; full design + ADR-059 amendment in docs/superpowers/specs/2026-06-20-faction-zone-content-eligibility-design.md (157-1 DONE). Strict fail-loud validator lands last."
priority: p2
status: backlog
repos: server,content
