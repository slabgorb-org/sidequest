    description: 'Durable hardening of the 158-8 freeform-pronoun crash class (158-8 shipped only an in-function fail-open guard in sidequest/server/emitters.py::_apply_pov_swap). Root cause: Character.pronouns: str (character.py) is unconstrained while the localizer swap_to_second_person only accepts the canonical grammatical set {he/him, she/her, they/them}. DESIGN CAVEAT (load-bearing): freeform pronouns are an INCLUSIVE chargen feature (builder.py pronouns_allow_freeform) — do NOT force Character.pronouns to a 3-value Literal and break inclusive display. Separate concerns: keep freeform DISPLAY pronouns (what the player chose) and derive/validate a canonical GRAMMATICAL projection for the localizer (or normalize at chargen). Server-only. Source: archived sprint/archive/158-8-session.md Delivery Findings ([TYPE] root cause, [SEC][LOW] span-attr, [SILENT] skip paths).'
