      ━━ Symptom / why (2026-06-25 coyote_star playtest, develop @aed2d812): a ship-combat verb ('bring guns online, lock a firing solution') produced intent_router.confrontation_verb_unrouted (verb_hits dogfight:lock, dogfight:gun) — the router declined to dispatch the dogfight. With no engine seated the narrator ground the SDK tool loop to max_turns=8 and the turn crashed. NOTE: the old "native dial_threshold dogfight / WN tool-withhold" framing in the original finding is obsolete — ADR-153 deletes the native dial; this story is now purely about the routing→seating→degradation contract. OPEN DISAMBIGUATION (confirm from the watcher stream): did the router fail to emit a ship-combat dispatch key, or dispatch-then-reject?
