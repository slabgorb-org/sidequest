  - id: 158-28
    title: WWN combat is narration-only — confrontation never seats, narrator confabulates kills with zero mechanical backing (IntentRouter combat-verb routing + opponent seater)
    description: "Playtest finding (pingpong 2026-06-24 beneath_sunden + 2026-06-25 barsoom, WWN, @aed2d812). Post-#1072 the crash is gone but combat is NARRATION-ONLY: attack -> narrator narrates a KILL while ground truth shows encounter=null, total_beats_fired=0, creature untouched, no Other seated; plus weapon confab (narrates 'mace' vs the PC long-blade kit). #1072 scoped to don't-crash, not do-seat. UPDATE (barsoom, plain world region=helium, NOT region-mode): reproduced cleanly — banth killed in pure prose, encounter_events=[], no Confrontation panel. RULES OUT literary-phrasing brittleness (blunt 'I attack X with my Y' also failed to seat) AND the beneath_sunden zone/location-reconcile theory. The never-SEATS failure is fundamental to the WWN combat dispatch/seater path (router classifies, encounter subsystem reached once, but no ENCOUNTER_STARTED created), independent of geography or phrasing; gating for ALL WWN worlds. 158-1 seat-reconcile + 158-2 literary-routing do NOT generalize. Real fix = the combat-SEATS path so a confrontation seats and the WN ruleset owns resolution (ADR-143). Lie-detector ACs: after an attack encounter != null, beats fire, creature HP changes, weapon sourced from inventory. Also folds the medium 'narrator apply-path mutates creature HP with no roll/beat/encounter' finding. Related robustness follow-up: make max_turns exhaustion degrade loudly (ADR-006) not crash+wedge."
    points: 5
    priority: p1
    status: backlog
    repos: server
    workflow: tdd
    type: bug
  - id: 158-29
    title: "DOGFIGHT seating turn crashes via narrator max_turns=8 on SWN — #1072's WN tool-withhold does not cover the native dial_threshold dogfight path"
    description: "Playtest finding (pingpong 2026-06-25 cont.2, coyote_star SWN, session 2026-06-25-coyote_star-1890cfbd, develop @aed2d812). Ship-combat verb ('bring guns online, lock a firing solution') -> intent_router.confrontation_verb_unrouted (verb_hits dogfight:lock,dogfight:gun): router declined to dispatch -> narrator grinds the SDK tool loop -> AnthropicSdkLoopExceeded max_turns=8 (anthropic_sdk_client.py:518) -> session.disconnect_save -> room teardown -> reconnect. The dogfight is a native dial_threshold confrontation (ADR-077), NOT WN hp_depletion, so #1072 wn_binding_owns_combat_resolution tool-withhold does NOT cover it. OPEN DISAMBIGUATION (confirm from watcher stream / unit drive): did narrator.tools.ruleset_filter fire with wn_binding_owns_combat=true on this space_opera turn? If NO, space_opera/SWN isn't recognized as WN-family by the predicate; if YES and it still ground to max_turns, the dogfight drives a different (native dial/beat) tool path the 5-tool withhold misses. encounter STARTED mid-crash via narrator tool-grinding, not the deterministic seater. Related: the general 'max_turns should degrade loudly (ADR-006) not crash+wedge' robustness gap."
    points: 3
    priority: p1
    status: backlog
    repos: server
    workflow: tdd
    type: bug
  - id: 158-30
    title: Resolved dogfight RESURRECTS via continued_same_region_drift overriding husk_reaped — soft-locks player into ship maneuvers while on foot
    description: 'Playtest finding (pingpong 2026-06-25 cont.2, coyote_star SWN, @aed2d812). After a dogfight RESOLVES (resolution_beat:straight, dials 0/30, active=False), a normal non-combat action in the same region re-summons it. encounter.husk_reaped correctly clears the resolved encounter at turn start, but later the SAME turn encounter.continued_same_region_drift (region=broken_drift, location label drift Kestrel->Cold Contact) re-attaches it and resets structured_phase Resolution->Setup; snapshot: encounter PRESENT, phase=Setup, total_beats_fired=1 carried. Player soft-locked into ship-maneuver beats while on foot in a derelict; Enter disabled. Root: two lifecycle rules disagree (husk_reaped clear vs continued_same_region_drift keep-alive-across-label-drift) and drift-continue wins. Fix: continued_same_region_drift must NOT re-attach a RESOLVED/reaped encounter, only carry over a LIVE one. Wedges the session + blocks ground/personal SWN combat seating (occupies the encounter slot).'
    points: 3
    priority: p1
    status: backlog
    repos: server
    workflow: tdd
    type: bug
  - id: 158-31
    title: DOGFIGHT is mechanically inert — push beats apply zero dial delta AND the encounter resolves after one beat regardless of the 0/30 threshold (hollow dial)
    description: 'Playtest finding (pingpong 2026-06-25 cont.2, coyote_star SWN, @aed2d812). encounter_events ground truth: ENCOUNTER_BEAT_APPLIED beat_kind=push outcome=Success own_delta=0 opponent_delta=0 (a Success that moves the dial by ZERO), then ENCOUNTER_RESOLVED outcome=resolution_beat:straight final dials 0/0 (no side reached 30). Two defects: (1) push beats apply zero dial delta (either dogfight ConfrontationDef beats carry no dial delta = content, or dial-delta computation returns 0 for dogfight push = code); a dial_threshold duel where Success builds 0 energy can never reach 30. (2) the engine fires ENCOUNTER_RESOLVED after a single resolution beat (straight) instead of checking the 30 threshold. Beat-by-beat across Fail/Success/CritSuccess the dial never leaves 0/30; a CritSuccess Counter Stance showed -5 to their edge but applied delta 0. Net: dogfight is mechanically inert, cannot be played to a win/loss. Mirrors the WWN hollow-strike on the dial track.'
    points: 3
