    description: 'Playtest finding (pingpong 2026-06-23, beneath_sunden MP, session 2026-06-23-beneath_sunden-mp-e88e04d6). psql dungeon_map: exp011.r2 has theme=bone_crypt at depth_score=8.216 but bone_crypt depth_band is {min:30.0} — region themed for a depth its own score excludes by 22 points (several similar cases). Root: _stage_design builds theme_pool from palette.themes_for_depth(frontier_edge.spawn_depth_score) (ONE value per expansion), but each node final depth_score is computed later and independently by assign_depth_scores, so a node theme and its own depth_score can disagree on which band they are in. Makes the depth->theme->difficulty gradient incoherent per-region (a deep bone_crypt at shallow depth). Engine fix. Shares the _deepest/depth-band machinery with 158-19 quest-pileup but distinct.'
