    title: 'Test-suite hygiene: shared DB-pool leak (rotating PoolClosed) + flickering_reach fixture yields no tier-1 WWN encounters'
    description: |-
      Two independent test-suite-hygiene defects that make the full server suite non-deterministically red (both surfaced 2026-07-01 scoping the 160-4 option-C green push; neither is a product-feature bug).

      (1) SHARED GLOBAL DB-POOL LEAK (test pollution — rotating PoolClosed). `sidequest/game/db_pool.py` holds a module-global `_POOL`; `close_pool()` nulls it. The many `_pg_isolation` autouse fixtures leak the closed pool between tests, so a later test hits `PoolClosed("the pool 'sidequest-save' is already closed")`. The FAILING SET ROTATES run-to-run and every affected test PASSES in isolation (prove with `-n0 -p no:randomly <test_id>`). Examples: `tests/integration/test_seam_crossing_wiring.py`, `tests/server/dispatch/test_pregen_bestiary_90_1.py`. Fix: make pool lifecycle test-isolated (re-init per test / don't share a nulled global). Safe fix, no production behavior change.

      (2) flickering_reach TEST-FIXTURE PACK yields no tier-1 WWN encounters. The stripped test-fixture pack's flickering_reach world resolves no tier-1 WWN encounter, so a real chargen commit fails loud with `EncounterSeedError` at `sidequest/server/dispatch/pregen.py:587` (correct fail-loud, story 90-1 — do NOT weaken the guard). Breaks ~7 chargen-commit tests: `test_45_2_chargen_to_playing_wire`, `test_106_1_chargen_armor_wire`, `test_resources_wired_on_session_create`, `test_chargen_quest_seed_wiring`, `test_153_19_character_location_cleanup_wiring`, `test_scenario_bind`, `test_entity_sync_world_tier_tropes`. Fix: add a tier-1 WWN encounter to the test-fixture pack (fixture-level; the real sidequest-content pack is fine).

      ALSO NOTED (lower priority, env/related — captured here so they are not lost):
      - `test_reference_poi_projection` is R2/env-dependent — needs an R2-availability skip-gate, not a code fix.
      - `test_dogfight_content_loading` — dogfight content loading; may fold into 158-39/158-40 (dogfight stories). Confirm at pickup.

      DO NOT gut assertions or weaken fail-loud guards to force green (naive regression). Fix the real root causes.
