  - id: 160-4
    title: Animal companion cannot join a SOLO session — SoloSlotConflict rejects the companion_of/pet connect; resolve doc-vs-engine design fork + make the understudy run loop fail loud on a rejected connect (unblocks 160-3 dogfood)
    description: |-
      sq-playtest 2026-06-27 (board ~/Projects/sq-playtest-pingpong.md). Found by SM (DRIVER) while dogfooding epic-160 animal companions. BLOCKS 160-3 (the solo dogfood path as written).

      WHAT HAPPENS: launching a companion (e.g. `companion play owl_sunden.yaml`, role: pet, companion_of: player1.local, game_slug = the live human room) against a SOLO beneath_sunden session (2026-06-27-beneath_sunden-3afa8493) → the companion opens the WS, sends SESSION_EVENT/connect, and the server immediately replies type=ERROR payload={"message":"solo game … already occupied by Curly","reconnect_required":false}. None of the four 160-3 signals fire (no chargen.complete / bond_resolved / routed_as_pet / distinct voice); the companion never seats.

      ROOT CAUSE (server = ground truth): SessionRoom.connect() (sidequest/server/session_room.py ~500-505): when self.mode == GameMode.SOLO, ANY other connected player_id raises SoloSlotConflict("solo game … already occupied by …"). The guard exists to prevent the "two parallel solo games on one slug" bug (playtest 2026-04-26) — but it treats a bonded companion exactly like a second human and rejects it. The connect never reaches bind_companion_bond / the chargen gate (no chargen_gate, no companion.bond_resolved, no traceback — the ERROR frame is the only output for the companion socket). Reproduced cleanly on a freshly-restarted single worker via a minimal WS probe (ProbeOwl, same connect frame → same ERROR), so NOT a stale-server artifact.

      DESIGN FORK (needs Keith's call — pick before implementing the guard half):
        (a) DOC-ONLY (if MP-is-intended): companions are multiplayer-only. The companion system prompt (plan C, 2026-06-25-companion-C-companion-package.md:483) literally says "You ARE a character in a live MULTIPLAYER tabletop game", and the epic-159 "Donut beside Keith" run + the existing -mp- saves all use MP rooms. Fix = the CompanionDef SETUP notes (donut_sunden.yaml et al.) + 160-3 must state the human room MUST be a multiplayer session; a companion cannot join a /solo/ game. Cheap, matches current behavior. Touches sidequest-understudy + the orchestrator 160-3 notes.
        (b) ENGINE (if solo-should-allow-a-pet — the natural Keith-solo-with-a-companion case): exempt companion_of-bearing connects from the SoloSlotConflict guard (a bonded pet is not a competing solo player). Touches sidequest-server (session_room.py).

      INDEPENDENT OF THE FORK — loud-failure hardening (No Silent Fallbacks, sidequest-understudy): the understudy run loop only handles SESSION_EVENT-ended / CHARACTER_CREATION / prompt / TURN_STATUS, so on an unhandled type=ERROR connect rejection it silently loops back to recv() and HANGS forever. It must surface the rejection loudly (log + exit non-zero), not hang. This half is a real defect regardless of (a)/(b).

      REPOS: sidequest-understudy (run-loop hardening, certain; + CompanionDef notes if path a) + sidequest-server (guard exemption if path b). SM should refine --repos once the fork is decided; the orchestrator 160-3 notes get the doc update under path (a).

      Related: 160-3 (dogfood validation — surfaced this; may pivot to an MP room instead). Board: ~/Projects/sq-playtest-pingpong.md (the [GAP/QUESTION] companion-seat task).
    points: 3
    priority: p2
    status: done
    started: '2026-07-01'
    repos: sidequest-understudy,sidequest-server
    workflow: tdd
    acceptance_criteria:
      - "Keith's design fork is resolved and recorded on the story: doc-only (companions are MP-only) OR engine (exempt companion_of connects from the SoloSlotConflict guard)."
      - 'Per the chosen path: either the CompanionDef SETUP notes + 160-3 state the human room must be multiplayer (a companion cannot join a /solo/ game), OR SessionRoom.connect() admits a companion_of/pet connect into a SOLO room without raising SoloSlotConflict (and still blocks a genuine second solo human).'
      - The understudy run loop fails loud on an unhandled type=ERROR connect rejection — logs the server message and exits non-zero instead of hanging at recv() (No Silent Fallbacks). Covered by a test driving a rejected connect frame.
      - 'A companion seats end-to-end on the supported room type: chargen.complete + companion.bond_resolved + routed_as_pet + a distinct per-species voice all fire (the four 160-3 dogfood signals), with an OTEL/wiring assertion.'
    completed: '2026-07-01'
    type: bug
    review_findings: "RE-REVIEW (Rework 1) REJECTED — 1 new High. Round-1 HIGH auth-bypass + MED PII both RESOLVED at root cause (security-confirmed, test-covered); legacy-resume + phase-gate connect-rejection correct. NEW [HIGH]: run.py:94 log+continue treats ALL in-session ERRORs alike and never inspects payload code; code=session_unbound recovers only by resending SESSION_EVENT{connect} (companion never resends; no wall-clock guard in cli.py), so a mid-session unbind (realistic on uvicorn --reload) hangs recv() silently forever — the story's own silent-hang anti-pattern relocated. Fix: branch on payload code (session_unbound -> resend connect_frame or fail loud; transient -> continue), fix the overclaiming comment, add a test. Server side is done. Residual LOW (non-blocking): exemption not bound to connecting socket's own auth (accepted design)."
    review_verdict: approved
  - id: 160-5
    title: Pet companion avatar shows a letter-fallback instead of its rendered companion_creature portrait — resolve a role:pet seat's Party-panel avatar to companion_<species>.png (already on R2) instead of the portrait_ref=None initial letter
    description: 'Keith-flagged in the 2026-06-27 MP beneath_sunden dogfood (Zeppo human + Tolliver owl, companion play owl). The Party panel shows the pet as a "T" letter tile, not the owl portrait. Stored snapshot (ground truth): Tolliver portrait_ref=None; Zeppo portrait_ref=picker_surface_folk_fighter_m01. The rendered owl portrait EXISTS on R2 — genre_packs/caverns_and_claudes/worlds/beneath_sunden/assets/portraits/companion_owl.png (r2_manifest.json:1865; portrait_manifest.yaml has 5 companion_creature entries from 160-2) — but nothing maps the pets species to it, so the avatar falls back to the initial letter. The species lives in the CompanionDef (species: owl) + the bond (room.pets_of); the avatar resolver should use it. Narrow player-facing fix; the broader "species not projected onto the character" gap is 160-6.'
    points: 2
    priority: p2
    status: backlog
    repos: server,ui
    workflow: tdd
    acceptance_criteria:
      - A role:pet seat with a known species resolves its Party-panel avatar to that species companion_creature portrait (companion_<species>.png on R2), not the portrait_ref=None initial-letter fallback.
      - 'Verified live: the owl companion shows companion_owl.png in the human Party panel in an MP beneath_sunden session.'
      - An OTEL/watcher span fires when the pet avatar is resolved from the companion_creature portrait (GM-panel lie-detector for the wiring).
      - 'Regression: a human seat portrait_ref (e.g. a picker_* selection) is unaffected.'
    type: bug
  - id: 160-6
    title: Pet identity not projected onto the seated character — a role:pet companion seats as a generic Warrior/Human (species/role live only in CompanionDef + bond); resolve the seating-path design fork so the creature identity is recorded on the character
    description: 'Surfaced alongside 160-5 in the same MP dogfood. A role:pet companion drives the naive human chargen UI and seats as a generic class=Warrior race=Human (chargen.complete schema=adr-114), with NO species/role/companion field on the seated character — the owl-ness exists only in the CompanionDef (species: owl) and the bond. Two contributing observations: (1) the bots chargen picks are unmappable (verbose persona prose does not string-match the choice buttons) so actuation defaults to the first option ("never stall the table"), making every species seat as Warrior + first-background; (2) there is no pet-specific seating path that records species/role on the character. Design fork to resolve here: should a pet seat via human chargen at all, or via a species/role path that records the creature identity? The 160-5 avatar fix is one facet; closing 160-6 may subsume it.'
    points: 3
    priority: p2
    status: backlog
    repos: understudy,server
    workflow: tdd
    acceptance_criteria:
      - A role:pet companion seated character records its species and pet role (queryable in the snapshot), rather than presenting as an indistinguishable generic Warrior/Human.
      - The seating-path design fork (human-chargen-for-pets vs a species/role seating path) is resolved and documented.
      - An OTEL span confirms the species/role projection at seat/bind time.
      - 'Naivety invariant preserved: no engine-knowledge alias tables or pick-rescue smuggled into the understudy bot (per understudy CLAUDE.md).'
