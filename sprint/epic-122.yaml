id: '122'
type: epic
title: Honest Layering — pure logic & utilities below the server tier
description: Implements ADR-147 (docs/adr/147-honest-layering-pure-logic-below-server.md). Corrects layering-inversion edges where low-level domain/utility code imports UP into sidequest/server. Relocates pure helpers and pure combat-rules logic to the tier their dependencies dictate, establishes a foundation floor, and adds a CI guard enforcing the import-direction law (foundation <- {game,genre,orbital,magic,interior} <- server). Behavior-preserving refactor; no library extraction. Five independently-shippable steps; 122-5 (guard) lands last and enforcing.
