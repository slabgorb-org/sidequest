id: '152'
type: epic
title: WN combat owns the full WWN action set — cast + Total Defense + Fighting Withdrawal via WWN math, not native beats (complete 108-8)
description: "Completes the WWN combat de-nativization (epic-108, ADR-143 'Bind the Ruleset, Don't Balance It'). 108-3 stripped ALL native combat beats off WWN hp_depletion defs (cdef.beats == []); 108-8 synthesized only the 'attack' action (beat_filter.is_wn_action_beat == {'attack'}) while item-use rode its own intercept. cast_spell, brace, and break_contact were stripped but NEVER synthesized — at dispatch (dice.py:414) they miss the attack intercept, fall into the empty-cdef lookup, and raise 'unknown beat_id ... available: []' before any round runs. LIVE OUTAGE: in WWN combat today you can attack and use an item, but you CANNOT cast a spell, brace, or disengage — a real player-facing regression across caverns_and_claudes/elemental_harmony/heavy_metal/barsoom, red since 108-3 landed ~2026-06-15. Keith ruling (brainstorm 2026-06-20, CORRECTED after WWN SRD reading): do NOT shape native into the SRD. cast IS a real WWN action -> route it to the WWN spell spine (152-2). brace/break_contact were the native 106-2 reprisal-mitigation model (tier-delta HP mitigation + whole-attack prevent + a per-beat reprisal) — WWN has NONE of those; REMOVE that scaffolding and replace it with the genuine WWN defensive actions: Total Defense (+2 AC + Shock immunity) and Fighting Withdrawal/Run (avoid the free attack on flee), resolved by WWN AC math (152-1). The opponent attacks once on its initiative slot vs the defender's AC — there is no per-beat reprisal. test_106_2 is REWRITTEN to WWN semantics, not kept as a native RED spec. Cast RED spec: test_dice_path_spell_cast_102_2 + per-pack dispatch cast tests + test_wwn_scene_harness_fixture_proof. Pure stale-id test-debt (committed_blow/strike->attack swaps, loader assertion flips) stays in 125-8 (epic-125). Separate roots surfaced in the same sweep (chargen [None x6], e2e chargen protocol, Fate-SRD catalog load, deprecated-world skips) get their own stories. Design doc: docs/superpowers/specs/2026-06-20-wn-full-action-set-design.md."
priority: p1
status: backlog
repos: server
stories:
  - id: 152-1
    title: '[ENGINE] WWN defensive actions — remove the native brace/break_contact reprisal-mitigation; add Total Defense (+2 AC/Shock immunity) + Fighting Withdrawal/Run disengage (WWN SRD 2.4.4)'
    description: "CORRECTED 2026-06-20 (Keith: 'why are we shaping native into SRD?' + WWN SRD reading; design doc docs/superpowers/specs/2026-06-20-wn-full-action-set-design.md). The original framing (synthesize native brace/break_contact beats + restore 106-2 reprisal-mitigation) was the ADR-143 trap — it ports native mechanics into the WWN binding: BeatKind.brace base:1 flat-HP mitigation via resolve_tier_deltas; break_contact prevents the WHOLE opponent attack; a per-beat opponent reprisal for brace to mitigate. WWN has NONE of these. WWN SRD: combat is side-initiative (2.4.1); the opponent attacks ONCE on its own turn (no per-beat reprisal); defense is Armor Class (2.4.4). The two WWN defensive actions are Total Defense (Instant Action — give up your Main Action; +2 Melee & Ranged AC and immune to Shock until the start of your next turn) and Fighting Withdrawal (Main Action — disengage from an adjacent melee attacker so a following Run provokes NO free attack; does NOT cancel the opponent's own-turn attack). FIX: (1) REMOVE the native defensive-reprisal scaffolding from the WWN path — _defensive_posture_for_reprisal brace tier-delta mitigation + break_contact prevent; drop the 'reprisal' framing (it is just the opponent's attack on its slot vs the defender's AC). (2) ADD WWN Total Defense: a committed Total Defense raises the defender's Melee/Ranged AC by +2 and grants Shock immunity until their next turn, resolved by the EXISTING WWN AC math (the opponent's d20+hit checks the boosted AC). (3) ADD WWN Fighting Withdrawal + Run: wire the deferred 'move' action so disengage avoids the free attack on a flee per 2.4.4 (does NOT cancel the opponent turn). (4) REWRITE test_106_2_wwn_defensive_reprisal to WWN semantics (AC+2 / Shock-immunity / free-attack-on-flee), NOT tier-delta mitigation or attack-cancellation. Magnitudes are SRD-verbatim (+2 AC, Shock immunity) — never invented. Preserve 108-8's closed-allowlist + isinstance gate."
    points: 5
    priority: p1
    status: in_progress
    repos: server
    workflow: tdd
    branch: feat/152-1-wwn-defensive-actions
    acceptance_criteria:
      - "Native defensive scaffolding is removed from the WWN path: _defensive_posture_for_reprisal's brace tier-delta mitigation + break_contact full-prevent no longer run under a WithoutNumberRulesetModule binding; the opponent attacks once on its slot vs the defender's AC (no per-beat reprisal model)."
      - A committed Total Defense raises the defender's Melee & Ranged AC by +2 and grants Shock immunity until the start of their next turn (WWN SRD 2.4.4), via the existing AC math — an opponent attack that hits at base AC misses under Total Defense, and Shock is suppressed.
      - A committed Fighting Withdrawal + Run avoids the free melee attack a flee would otherwise provoke (WWN SRD 2.4.4); it does NOT cancel the opponent's own-turn attack.
      - test_106_2_wwn_defensive_reprisal is REWRITTEN to assert WWN semantics (AC bump, Shock immunity, free-attack-on-flee) — not native tier-delta mitigation or whole-attack prevention; no native magnitude reproduced.
      - "OTEL: the opponent-attack span carries the defender's committed WWN action (e.g. total_defense) and the AC delta applied, so the GM panel sees the defense fire. 108-8 invariants stay green (closed allowlist; native packs' authored ids resolve on the native engine)."
      - All magnitudes are WWN-SRD-verbatim (+2 AC, Shock immunity); nothing invented; no content changes.
    type: bug
  - id: 152-2
    title: '[ENGINE] Synthesize the cast WN action (cast_spell) so casting resolves on a zero-beat WWN combat def — route the synthesized cast to the existing wwn cast spine'
    description: "Surfaced during 125-8 triage (brainstorm 2026-06-20, ADR-143; design doc docs/superpowers/specs/2026-06-20-wn-full-action-set-design.md). 108-3 stripped cast_spell off every WWN hp_depletion combat def; 108-8 synthesized only 'attack'. cast_spell is NOT in is_wn_action_beat's allowlist, so a cast commit falls into dice.py:417's empty-cdef lookup and raises 'unknown beat_id cast_spell ... available: []' BEFORE the existing wwn cast spine (dice.py:440-488: spell_id validation, catalog resolve, cast resolution) ever runs. The apply-beat path breaks the same way (narration_apply.py ValueError 'cast_spell'). WWN combat spellcasting is a live outage across caverns_and_claudes/elemental_harmony/heavy_metal, red since 108-3. FIX: route a wwn cast_spell commit to the cast spine BEFORE the cdef beat lookup — model on the is_item_use_beat transient intercept (dice.py:390) and the attack synthesis (dice.py:414); the spine + validations already exist and are correct, this makes them reachable on a zero-beat def. Mirror the fix on the apply_beat path. RED spec (already written, failing): tests/integration/test_dice_path_spell_cast_102_2.py; tests/integration/test_wwn_{caverns,elemental_harmony,heavy_metal}_dispatch.py (cast routes through the wwn module on real packs); tests/integration/test_wwn_scene_harness_fixture_proof.py (cast_spell ablates hp). Keep all spine guards loud (spell_id required, catalog membership, opposed-check refusal). No content changes."
    points: 5
    priority: p1
    status: backlog
    repos: server
    workflow: tdd
    acceptance_criteria:
      - A cast_spell commit (with spell_id) on a zero-beat WWN hp_depletion combat def resolves through the wwn cast spine (wwn.spell.cast span), not DiceDispatchError 'unknown beat_id'.
      - Cast outcome is independent of the d20 face; a killing cast resolves the encounter and suppresses reprisal; a no-casts-remaining cast is refused-but-recorded (refused=True), not a generic stat throw (test_dice_path_spell_cast_102_2).
      - The dice path and the apply_beat path reach the SAME cast spine (parity test green); narration_apply no longer raises ValueError 'cast_spell' on a zero-beat def.
      - Cast routes through the WWN module on the real caverns_and_claudes / elemental_harmony / heavy_metal packs (per-pack dispatch tests green).
      - All existing spine guards stay loud (missing spell_id raises, unknown spell_id raises, cast on an opposed_check cdef raises); no content changes.
    type: bug
  - id: 152-3
    title: '[TEST] Restore the chargen class-surface tests (test_cc_chargen_e2e + test_class_signature_wiring) — fix the brittle multi-choice-scene walk + reconcile class_moves to the de-nativized WN action set'
    description: "TRIAGE (Architect, 2026-06-20; design doc docs/superpowers/specs/2026-06-20-wn-full-action-set-design.md): the chargen [None x6] failures (test_cc_chargen_e2e 4, test_class_signature_wiring 6) are a STALE TEST, NOT a regression. The WWN chargen flow has TWO choice-scenes — the_calling (3 choices, each with mechanical_effects.class_hint Warrior/Expert/Mage) and the_trade (6 background choices, NO class_hint). _build_character's walk (test_class_signature_wiring) naively requires EVERY choice-scene to contain a class_hint==target_class choice, so it dies on the_trade with 'target_class Warrior not in [None,None,None,None,None,None]'. Class selection content is INTACT (char_creation.yaml:23/29/35); the brittle walk simply never adapted to the 120-1 chargen reconciliation that added the_trade. The tests ALSO assert de-nativization-coupled surface (committed_blow in class_moves; Mage class_moves populated from encounter_beat_choices) — under the synthesized WN action set (epic-152) a WN class carries no per-class combat beats (encounter_beat_choices -> [] per 108-7), so the combat menu is the WWN action set (attack/cast/Total Defense/Fighting Withdrawal), not per-class beats. FIX: (1) make the chargen walk pick the class choice on the_calling and a background choice on the_trade (and any future choice-scene) instead of assuming one class scene; (2) reconcile the class_moves / signature assertions to the de-nativized surface the epic-152 stories define. Depends on 152-2 so the action-set surface is settled before asserting it. No production regression — this is test restoration + surface reconciliation."
    points: 3
    priority: p2
    status: backlog
    repos: server
    workflow: tdd
    depends_on: 152-2
    acceptance_criteria:
      - The chargen walk in test_class_signature_wiring handles BOTH choice-scenes (class on the_calling, background on the_trade) and reaches confirmation — no [None x6] failure.
      - class_moves / signature assertions reflect the de-nativized WN combat surface defined by 152-1/152-2 (universal synthesized action set; WN classes carry no per-class combat beats), not the pre-strip committed_blow/per-class beat model — assertions updated, not deleted.
      - test_cc_chargen_e2e and test_class_signature_wiring are green; class selection + the WWN Calling signature abilities (Killing Blow/Veteran's Luck, Read the Ledger, Read the Worked Stone) + pronoun-agnostic prose all still asserted.
      - No production code changed for the walk fix; any class_moves surface change needed is owned by 152-1/152-2, not invented here.
    type: bug
