id: '83'
type: epic
title: "Lobby Redesign — The Standing Folio"
description: "Holistic from-scratch redesign of the SideQuest lobby per the Claude Design handoff (Direction A · The Standing Folio). Kills the scrollbar in the world list, replaces it with a fold-fitting genre accordion, and reframes the lobby as a literary manuscript title page: masthead name ritual, two-pane folio card (genre accordion + cinematic per-genre preview), commit row (Solo/MP toggle + Start), and below-the-fold sections (live presence, past journeys, dev scene library). Dark Folio palette + Pirata One/EB Garamond, subtle per-genre accent shift. Wires to the existing real worlds/sessions data hooks; hero art stays atmospheric CSS placeholders standing in for runtime AI renders."
priority: p2
status: in_progress
repos: ui
stories:
  - id: 83-1
    title: "Rebuild ConnectScreen as the Standing Folio lobby — genre accordion + cinematic preview"
    description: "Replace the current scrolling-list lobby (ConnectScreen.tsx + src/screens/lobby/*) with Direction A 'The Standing Folio' from the Claude Design handoff. Reference bundle committed at sidequest-ui/design-reference/lobby-standing-folio/ — READ chats/chat1.md (intent: 'I hate the scrollbar… holistic redesign'; user locked in Direction A) and project/SideQuest Lobby.html + tokens.css for the pixel-target. Recreate the visual output in React/TS; do NOT port the prototype's inline-Babel structure. The prototype invents 20 fake worlds — IGNORE its data; wire the real catalogue from the existing /api/genres feed (GenresResponse/GenreMeta/WorldMeta) and reuse the live data hooks already in place (useSessions, useStartGame, useDisplayName, historyStore, /dev/scenes). The /tmp design fonts (Pirata One via Google, EB Garamond/Oswald self-hosted) and the Dark Folio palette in tokens.css are the type/color spec. Hero art stays atmospheric CSS-gradient placeholders standing in for the runtime AI render (per the designer's own note). Net change is structural+visual: keep every existing data path and behavior (localStorage name/genre/world persistence, mode toggle, start/join, scene library dev-gate), change the layout and chrome."
    points: 5
    priority: p2
    status: done
    repos: ui
    workflow: tdd
    acceptance_criteria:
      - 'Masthead ''opening ritual'' renders: ornament dinkus, Pirata One ''SideQuest'' wordmark, italic tagline, and the centered name input (autofocus, placeholder); name persists to/from localStorage exactly as today.'
      - 'World index is a genre ACCORDION (no scrollbar anywhere): one collapsible row per genre sourced from /api/genres; clicking a genre header expands its worlds inline and collapses the previously open one; the eyebrow shows live ''{N} worlds across {M} genres'' from real data.'
      - 'Genre/world rows carry full keyboard + ARIA semantics: genre headers are aria-expanded buttons with a rotating chevron; worlds are role=radio inside role=radiogroup with aria-checked on the selected world; accent focus-ring visible on keyboard focus across headers, rows, mode buttons, Start.'
      - "Selecting a world updates the cinematic preview pane: hero art (per-world/per-genre CSS gradient placeholder) with genre label, world title, era line, tone chips (cosy/gritty axes from existing toneAxes), blurb, and 'Inspired by' list — all from real WorldMeta, with graceful fallbacks for any field the server doesn't supply."
      - 'Commit row works end-to-end: Solo / Multiplayer segmented toggle drives the Start button label (''Start Adventure'' vs ''Start or Join'') and start/join flow via the existing useStartGame; Start is disabled with no world selected; Rules/Lore links present.'
      - 'Below-the-fold sections retained and wired to real data: ''Currently in this world'' (live presence via useSessions, empty-state copy when none), ''Past journeys'' (history from historyStore, clicking re-selects that world), and the dev-gated ''Scene library'' (fixtures from /dev/scenes, only when dev endpoint available).'
      - "Subtle per-genre accent shift only: selecting a world sets the [data-genre] accent (per tokens.css map); type and structure stay the manuscript house style — no full genre re-skin."
      - "Responsive per the design breakpoints (single-column folio + two-up index grid at <=880px; stacked commit row + full-width Start at <=560px); global scrollbars hidden per tokens.css; reduced-motion respected (transform-only entrance, visible end-state as base — no opacity:0-stuck cards)."
      - Existing ConnectScreen tests updated/replaced (ConnectScreen.test.tsx, ConnectScreen.reference.test.tsx, lobby-start-ws-open, lobby-house-archetype-wiring, slug-connect-readystate-effect) so the suite proves the new structure; includes a wiring test that the redesigned screen is mounted in the real app route and reachable, not just rendered in isolation.
    completed: '2026-06-03'
    review_findings: "AC7 per-genre-accent test is vacuous (passes even if the accent shift is broken — asserts accordion rows' static data-genre, not the lobby root's selection-driven data-genre). Test-only rework: tighten AC7 to assert .lobby-folio root data-genre flips on selection; bundle aria-expanded initial-value, collapse-path, scene-empty positive, and empty-hero tests + fix stale 'sorts' comments. Production code correct; full suite green."
    review_verdict: approved
  - id: 83-2
    title: Standing Folio lobby — close AC8 gaps (880/560 breakpoints + reduced-motion) and design-divergence ratification
    description: "Follow-up to 83-1 from a UX verification pass (Alex/ux-designer, 2026-06-03, Playwright on localhost:5173) comparing the MERGED Standing Folio lobby against (a) the Claude Design handoff and (b) story 83-1's own AC8. The redesign is sound and faithful overall — masthead, genre accordion (zero scrollbar), cinematic preview, per-genre accent flip (cool-blue Space Opera / warm-gold Tea&Murder), commit row, and responsive single-column collapse all verified working. This story closes the AC8 gaps that shipped and ratifies two conscious design divergences. KEY GAPS vs 83-1 AC8: (1) breakpoints shipped as Tailwind defaults md=768/sm=640, but AC8 spec'd <=880px (single-column folio + two-up index grid) and <=560px (stacked commit row + full-width Start) — at 860px the live lobby is still two-column. (2) reduced-motion is entirely unhandled: no prefers-reduced-motion media query or motion-reduce: variant anywhere in src; the build skipped the design's gated entrance fade but ADDED unguarded animate-spin (WorldPreview image spinner) + animate-pulse (loading skeleton + ConnectScreen 'loading' text) that ignore reduce. DIVERGENCES TO RATIFY: (3) CurrentSessions returns null when empty ('no 0-players-online sadness signal') instead of the design's 'No lanterns lit here tonight.' copy — note this also contradicts 83-1 AC6 ('empty-state copy when none'). (4) Rules link lives in the commit row, so pack-Rules needs a world selected first — minor ADR-135 ('reference pages are a public table tool') tension; NB the approved design ALSO put Rules in the commit row, so current behavior is faithful — exposing pack-Rules without a world is a NEW improvement beyond the design. PARKED (from 83-1 archived session): self-host Pirata One (currently house-serif fallback), add console.warn to silent catches (/dev/scenes, loadSavedState, saveState), add data-testid=lobby-accent-root to harden AC7, guard effectiveOpenGenre against a stale removed-pack genre. Also observed: a flash-of 'Could not load worlds. Is the server running?' on cold mount before the worlds fetch settles. Full UX design spec: docs/design/83-2-lobby-folio-followups.md."
    points: 5
    priority: p2
    status: backlog
    repos: ui
    workflow: tdd
    acceptance_criteria:
      - 'Breakpoints match 83-1 AC8 spec, not Tailwind defaults: folio collapses to single-column + two-up index grid at <=880px, and the commit row stacks with full-width Start at <=560px. Runtime-verified at the boundaries (881 vs 880, 561 vs 560).'
      - 'Reduced-motion respected: animate-spin (WorldPreview image spinner) and animate-pulse (loading skeleton + ConnectScreen pulse text) are guarded with motion-reduce: (or gated behind prefers-reduced-motion: no-preference). Under an emulated prefers-reduced-motion: reduce, no looping animation runs and all content has a visible end-state as its base (no opacity:0-stuck cards).'
      - "CurrentSessions empty-state decision recorded and implemented: EITHER restore the design's 'No lanterns lit here tonight.' copy (matches 83-1 AC6) OR keep null-on-empty and amend 83-1 AC6 to document the intentional divergence. One or the other — no silent contradiction left."
      - "ADR-135 Rules discoverability decision recorded: accept commit-row placement (faithful to the approved design) OR expose pack-scoped Rules from the genre header without requiring a world selection. If 'expose', it is implemented and the pack-Rules link is reachable with no world selected."
      - 'Parked items resolved or explicitly deferred with rationale: (a) Pirata One self-hosted for the wordmark (replaces house-serif fallback); (b) console.warn added to the three silent catches (/dev/scenes, loadSavedState, saveState) per No-Silent-Fallbacks; (c) data-testid=lobby-accent-root added and AC7 accent test asserts against it; (d) effectiveOpenGenre guarded against a stale genre whose pack was removed.'
      - Cold-mount worlds fetch shows a loading state (not the 'Could not load worlds. Is the server running?' error) until the fetch resolves or genuinely fails; the error copy only appears on a real failure.
    type: chore
completed: '2026-06-03'
