    title: "Harden the unminted-objective lie-detector: retire/augment the 14-phrase hardcoded keyword gate in dispatch_engagement_watcher.py (a noir 'discreet job' hook trips none of them) with intent-router-backed objective detection — the router already classifies objective-giving turns. Goal: narration.unminted_objective.suspected fires on open-ended hooks, not just curated phrasings, so the GM panel beeps when quest_log stays empty under a stated objective. Includes the span already routed in SPAN_ROUTES."
    points: 5
