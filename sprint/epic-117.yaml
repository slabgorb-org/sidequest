  - id: 117-2
    title: "Design + ADR: quest-seed authoring contract. Define how an authored hook (opening.complication / seed_trope) declares a structured quest_seed that mints a real QuestEntry deterministically when the player accepts it — no narrator tool-call required. Cover: schema (objective/anchor/stakes), the acceptance trigger (how 'player took the job' is detected without a Zork verb-set), interaction with seed_quest_spine (drive/calling seeds) and record_quest (narrator-minted), and the OTEL span. Tabletop-First framing: a DM who hands you a job has handed you a quest. Exemplar: perseus_cloud floor-boss detective hook."
    points: 3
    priority: p1
    status: backlog
    repos: server,content
    workflow: superpowers
  - id: 117-3
    title: 'Implement deterministic quest-seed minting: an authored opening/seed_trope quest_seed mints a QuestEntry into quest_log on acceptance, emitting quest.created/quest.seeded spans, so QUESTS projects to QuestsPanel without depending on the narrator calling record_quest. Author the perseus_cloud floor-boss detective hook as the first quest_seed (content). Wiring test: scripted opening → accept → quest_log non-empty → quests.emitted quests>=1.'
    points: 8
