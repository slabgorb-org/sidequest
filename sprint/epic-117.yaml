    title: "Fix stale 'just otel' reference in CLAUDE.md — points at deleted server /dashboard route; should be the React Inspector at localhost:5173/#/dashboard (server HTML dashboard deleted in #859). Pure doc drift surfaced during the quest-blindness investigation."
