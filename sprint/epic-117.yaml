  - id: 117-6
    title: "Un-seeded narrator-objective classifier — detect open-ended objective-giving in narration without a keyword list. Follow-up to 117-4 (Keith ruled Option A 2026-06-14): the intent router is pre-narration and player-turn-scoped, so it has NO signal for an un-seeded narrator-introduced objective (a noir 'discreet job' hook with no pending_quest_offer). 117-4 hardened only the SEEDED path (router quest_offer signal) and retained the 13-phrase _UNMINTED_OBJECTIVE_MARKERS keyword matcher as the un-seeded backstop. This story replaces that brittle backstop with a real classification (e.g. a post-narration micro-pass) so narration.unminted_objective.suspected fires on open-ended hooks regardless of phrasing. Needs an ADR-146 addendum + cost analysis (Cost-Scales-with-Drama: a per-turn narration classification isn't free). The Zork-matcher must ultimately die."
