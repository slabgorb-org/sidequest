id: '121'
type: epic
title: F4 — Fate Core content migration (ADR-144)
description: 'ADR-144 F4 slice: migrate the four native-bound narrative packs (pulp_noir, tea_and_murder, wry_whimsy, spaghetti_western) onto ruleset: fate. KEY FINDING (Neo Architect, 2026-06-15): F4 is NOT pure-content — same shape as F3 was not pure-UI. F1 built the FateSheet model + attached it to CreatureCore.fate_sheet, but NOTHING constructs one: the RulesetModule chargen seam (seed_chargen_resources -> ChargenResources, builder.py:2866) is WN-shaped (effort/spellcasting/system_strain only, no fate_sheet slot), the genre loader has no FateConfig (rules.py has Swn/Cwn/Awn/Wwn, no fate arm), and FateRulesetModule overrides no chargen hook. Binding ruleset: fate today yields PCs with fate_sheet=None — zero skills, every resolve_action at Mediocre. So F4 needs an ENGINE SPINE first (F4a) before any pack content lands, mirroring F3a. SCOPE BOUNDARY (Neo call, veto-able): F4a seeds a VALID DEFAULT sheet from pack config so packs are immediately playable; interactive Fate chargen (player authors aspects, allocates skill pyramid, picks stunts) is OUT of F4 — later epic. Skill seeding mandatory; default aspects seeded + refined in play. Sequencing: F4a gates all; F4b (pulp_noir, Fate ancestral home) is the pilot proving F4a end-to-end, then F4c-e fan out. F4 gates F5 (native removal). Design: docs/superpowers/specs/2026-06-14-fate-core-binding-replaces-native-design.md S5; ADR-144.'
priority: p2
status: backlog
repos: server,content
stories:
