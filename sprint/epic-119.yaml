  - id: 119-3
    title: Conditional on 119-1 NO-GO; mutually exclusive with 119-2. Port narrator inference from the raw anthropic Messages SDK onto the Claude Agent SDK (claude-agent-sdk package) with subscription auth, the help doc explicitly-covered surface. Rewrite the ~120-line manual tool loop complete_with_tools (anthropic_sdk_client.py:248-705, which reads response.stop_reason==tool_use, appends assistant/user tool blocks, re-calls messages.create) onto the Agent SDK own tool/loop model, and re-express the Pydantic-generated tool schemas from tool_registry (tool_registry.py:225-249) as Agent SDK tools. Preserve every narration tool contract, the convergence semantics, and OTEL. Subscription/OAuth auth, ANTHROPIC_API_KEY unset, No-Silent-Fallbacks. Heavy-lift fallback, only worked if the spike rules out the cheap re-auth.
    description: 'ACTIVATED 2026-06-15 by 119-1 spike NO-GO (raw anthropic Messages SDK over subscription OAuth -> 400 credit-balance-too-low; routes to the metered API-platform ledger, NOT the subscription). claude-agent-sdk over the subscription login (ANTHROPIC_API_KEY and ANTHROPIC_AUTH_TOKEN both UNSET) = clean Sonnet inference, service_tier=standard, draws the subscription pool = GO/derisked. Reusable harness: scripts/spike_119_3_agentsdk_subscription.py (the NO-GO counterpart is scripts/spike_119_1_oauth_billing.py). PORT LANDMINE: claude-agent-sdk inherits project context from cwd — the spike smoke test replied IN AN SM PERSONA, having absorbed CLAUDE.md. The narrator port MUST pin system_prompt + cwd + setting_sources so the SDK does not silently absorb repo project context (SOUL No-Silent-Fallbacks). Still: preserve every narration tool contract, the complete_with_tools convergence semantics (anthropic_sdk_client.py:248-705), the Pydantic tool schemas from tool_registry (tool_registry.py:225-249), and OTEL. Verdict in memory: agent-sdk-credit-needs-subscription-auth-not-api-key.'
