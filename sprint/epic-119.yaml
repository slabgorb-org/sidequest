id: '119'
type: epic
title: 'Narrator inference: move off API-key PAYG onto the free subscription (Agent SDK credit CANCELLED)'
description: 'REFRAMED 2026-06-15 (ADR-101 Amendment 2026-06-15). Anthropic CANCELLED the May "Agent SDK credit" split — claude -p and the Claude Agent SDK stay FREE on the Max subscription, unchanged; there is NO metered credit to claim. The original premise (programmatic usage carved into a separate $200/mo credit that an API key forfeits) is VOID. What still holds: SideQuest narrator (Sonnet 4.6) + intent classifier (Haiku 4.5) auth via ANTHROPIC_API_KEY through the single Story-91-1 choke point build_async_anthropic() (sidequest-server/sidequest/agents/llm_factory.py), so ~$150/mo bills full PAYG — and ~$500 was already sunk because ADR-101 abandoned free claude -p for the API key on the now-void premise. This epic moves that inference off the API key onto subscription auth. Gating spike 119-1 (sharpened, NOT dead): does the raw anthropic SDK over subscription OAuth draw the free subscription pool, or still bill PAYG? Signal is now a clean binary — watch for a PAYG line, NOT a credit meter. GO -> cheap re-auth of the single choke point (119-2; design spec docs/superpowers/specs/2026-06-15-narrator-subscription-oauth-reauth-design.md). NO-GO -> port to claude-agent-sdk (119-3, mutually exclusive; email-confirmed free). 119-4 hardens token refresh + cost OTEL (now subscription-pool budgeting, not credit-vs-PAYG). The literal claude -p CLI is a TRAP (claude_client.py lacks complete_with_tools / no tool-use) — "return to claude -p" = return to the free subscription via 119-2/119-3, NOT a sidecar rollback. Refs: ADR-101 Amendment (2026-06-15); SOUL No-Silent-Fallbacks.'
priority: p1
status: backlog
repos: server
stories:
  - id: 119-1
    title: 'Spike (operator-run, go/no-go): does the raw anthropic SDK authed via subscription OAuth draw the Max Agent SDK credit, or still bill PAYG? Anthropic help blesses Claude Agent SDK usage specifically, so raw-Messages-SDK-over-OAuth qualifying is UNVERIFIED. Harness (full recipe in context doc): ant auth login to the Max workspace, unset ANTHROPIC_API_KEY, export the OAuth token as ANTHROPIC_AUTH_TOKEN, fire a few tiny messages.create calls on model claude-haiku-4-5 with the oauth-2025-04-20 beta header. SIGNAL: watch the Agent SDK credit meter in subscription billing draw down (positive); absence from the Console Cost page is a WEAK signal (it commingles interactive 5-hr-cap overage). Confirm the 200 credit is not already exhausted; run from a shell not also doing interactive Claude Code. Deliverable: a written GO/NO-GO that selects 119-2 vs 119-3 plus the reusable snippet. Operator runs the login and reads the meter; agent preps the harness and records the verdict.'
    description: 'REFRAMED 2026-06-15 (ADR-101 Amendment): the "Agent SDK credit" was CANCELLED — there is NO credit meter to watch (the title still says "credit"; CLI cannot edit titles — trust this note + the ADR amendment). The spike is SHARPENED, not dead: clean binary — does an OAuth-authed messages.create() draw the FREE subscription pool, or bill PAYG? SIGNAL = watch for a PAYG line on the Console (the credit-meter / 5-hr-overage discount language in the title is void). Operator recipe unchanged: ant auth login to Max -> unset ANTHROPIC_API_KEY -> export ANTHROPIC_AUTH_TOKEN -> fire a few claude-haiku-4-5 messages.create with the oauth-2025-04-20 beta. Auth transport is CONFIRMED supported (claude-api skill: SDK resolves ANTHROPIC_AUTH_TOKEN / ant profile); only billing attribution is open. Deliverable: written GO/NO-GO selecting 119-2 (GO) vs 119-3 (NO-GO).'
    points: 2
