  - id: 119-2
    title: Conditional on 119-1 GO; mutually exclusive with 119-3. Re-auth the single Anthropic client choke point to subscription OAuth so narrator + classifier draw the Agent SDK credit instead of PAYG. Change build_async_anthropic() (llm_factory.py:76-96) to construct AsyncAnthropic via the OAuth/auth_token path (ANTHROPIC_AUTH_TOKEN plus the oauth-2025-04-20 beta header) instead of api_key=, and relax the api-key presence check in AnthropicSdkClient.__init__ (around lines 142-147) to accept token mode WITHOUT a silent fallback (fail loud if neither key nor token is present; SOUL No-Silent-Fallbacks). ANTHROPIC_API_KEY must be UNSET in the server env (a set key overrides the token and forfeits the credit; the API rejects both-set). The tool-use loop complete_with_tools (anthropic_sdk_client.py:248-705) is UNTOUCHED, still the raw Messages SDK. Because this is the single Story-91-1 choke point, narrator (Sonnet) + classifier (Haiku) + any Opus/Fable all move together. Verify the tool_use turn loop still converges. Hours of work; ~150/mo to ~0.
    description: 'REFRAMED 2026-06-15: "draw the Agent SDK credit" -> "draw the FREE subscription pool" (credit cancelled, ADR-101 Amendment). DESIGN SPEC (Architect): docs/superpowers/specs/2026-06-15-narrator-subscription-oauth-reauth-design.md — scopes the seam and flags the risk the "one-line" framing hides: the oauth-2025-04-20 beta must COEXIST with the existing extended-cache-ttl-2025-04-11 beta on a comma-joined anthropic-beta header. A naive client-default header gets clobbered per-request -> silently kills OAuth (back to PAYG) or caching (cost regression). Contract: dual-mode fail-loud credential selector (both key+token set -> raise; neither -> raise; one -> use it); ANTHROPIC_API_KEY unset in server env. Verify BOTH betas on the wire AND cache_read_input_tokens>0 post-swap — NOT just "narrator still talks". complete_with_tools (anthropic_sdk_client.py:248-705) UNTOUCHED. 119-4 owns the static-token -> auto-refreshing-ant-profile durability. (Title still says "credit" — trust this note + the spec.)'
    points: 3
