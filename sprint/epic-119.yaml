    acceptance_criteria:
      - Agent SDK client pins system_prompt, cwd, and setting_sources so it does NOT inherit project CLAUDE.md / repo context from the launch cwd (the 119-3 spike smoke test absorbed an SM persona); covered by a test asserting narrator output is not contaminated by repo project context.
      - ANTHROPIC_API_KEY and ANTHROPIC_AUTH_TOKEN both unset in server env; auth resolves via the subscription login profile, fail-loud if absent (no silent PAYG fallback).
      - Haiku callers (Intent Router, aside, classifier, archetype) ALSO move off PAYG onto the subscription via claude-agent-sdk in this story — not just the Sonnet narrator. The single-shot forced-tool_choice / tool_choice=none patterns are re-expressed on the Agent SDK surface (or an explicitly-justified equivalent), preserving each call site contract; no caller is left on the raw api_key/PAYG path.
