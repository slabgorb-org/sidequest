id: '118'
type: epic
title: F3 — Fate Core UI surfaces (ADR-144)
description: "ADR-144 F3 slice: player-facing Fate Core UI for the four narrative packs (pulp_noir, tea_and_murder, wry_whimsy, spaghetti_western). Reactive Fate panel (fate points, aspects+invoke, skill ladder, stress boxes, consequence slots), 4dF roll display, compel accept/refuse. KEY FINDING (Neo Architect pass 2026-06-15): nothing Fate-shaped is on the wire to the client today — FateActionPayload is client->server intent only; the 4dF dice tuple lives only on the OTEL span — so F3 is NOT pure-UI. Its spine is a new FATE_STATE reactive projection+message (server) consumed by a new panel (ui), mirroring ADR-136 RELATIONSHIPS. Player-facing math mandatory (Sebastien/Jade) — player-UI mandate, NOT OTEL/GM-panel. Every Fate surface ruleset=='fate'-gated so it never co-renders with the WN/native beat/dial ConfrontationOverlay (paired negative test required). F1+F2 done; F3 not gated by F4/F5. Critical path F3a->F3b. Parked open Qs: 4dF flat-readout vs 3D Fudge die (gates F3c), compel carrier aside-channel vs in-panel control (gates F3e)."
priority: p2
status: backlog
repos: server,ui
stories:
  - id: 118-1
    title: "F3a — FATE_STATE reactive projection + wire message (the spine): promote build_fate_projection into a full client payload (per-PC fate_points/refresh, skills->ladder, all aspects+kind+free-invoke counts, stress boxes, consequence slots; scene situation aspects+boosts; conflict sides/turn order). Add FATE_STATE GameMessage+payload (model on RELATIONSHIPS/QUESTS in protocol/), an on-change emitter gated pack.rules.ruleset=='fate' (Cost-Scales-with-Drama, NOT per-turn), and fate.projection.emitted OTEL span. No UI. Mirrors ADR-136 RELATIONSHIPS. Files: game/ruleset/fate_projection.py, game/fate_sheet.py, protocol/, telemetry/spans/fate.py."
    points: 5
    priority: p2
    status: done
    started: '2026-06-15'
    repos: server
    workflow: tdd
    completed: '2026-06-15'
    review_verdict: approved
  - id: 118-2
    title: 'F3b — Fate panel (read surface): new FatePanel.tsx (dockview, mirror RelationshipsPanel/QuestsPanel) rendering per-PC fate-point count, aspect list grouped by kind (high-concept/trouble/character/situation/boost/consequence) with free-invoke pips, skills on the ladder (Terrible -2 .. Legendary +8, labels + numeric), consequence slots (mild/moderate/severe/extreme, filled vs open). Wire a fateState slice into useStateMirror + GameStateProvider (idempotent full-replace, null-guard, No-Silent-Fallback malformed-payload log) and register in GameBoard. Genre-themed CSS custom props. THE mechanics-legibility surface for Sebastien/Jade — all numbers labeled.'
    points: 5
    priority: p2
    status: done
    started: '2026-06-15'
    repos: ui
    workflow: tdd
    depends_on: 118-1
    completed: '2026-06-15'
    review_verdict: approved
  - id: 118-3
    title: 'F3c — 4dF roll display (dice surface): surface the 4dF result to the player — four Fudge faces {-,0,+}, ladder rating, shifts, outcome tier, succeed-with-style highlight. DEFAULT shape = flat readout in the Fate panel/narration (roll rides FATE_STATE or a small FateRollPayload). PARKED OPEN Q (Keith decides before RED): flat readout (3pt, tdd) vs extend the Rapier 3D overlay with a Fudge die derived from dice-lib d6.ts + GENRE_DICE_THEMES (5pt, superpowers, design-heavy, touches live WN/native dice path — add NEW die kind, never mutate d6). Filed at the flat default. Player sees faces+ladder+shift+tier regardless (legibility mandate).'
    description: |-
      F3c — 4dF roll display (3D Fudge die). RESOLVED 2026-06-15 (Keith): Option B — extend the Rapier 3D dice overlay with a real Fudge die, NOT the flat readout. Player sees four Fudge faces {+,0,−}, ladder rating, shift total, outcome tier, succeed-with-style highlight (legibility mandate — Sebastien/Jade, player-UI not OTEL). ruleset=='fate'-gated; must never co-render with the WN/native ConfrontationOverlay (paired negative test required).

      SCOPE = 3 repos: server, ui, dice-lib.
      - dice-lib (~/Projects/dice-lib, @local/dice-lib, trunk-based on main; ONE shared working copy symlinked into every oq clone via file:../../dice-lib — a local edit is live in all clones instantly, source-linked, no build): add a NEW 'dF' DieKind ADDITIVELY to DIE_REGISTRY. The Fudge die is a d6 cube — reuse D6_RADIUS / D6_COLLIDER_VERTICES / geometryKind 'box'; new face→value map {+1,0,−1} ×2 each; render glyphs via the existing procedural FaceLabels + drei <Text> path (dF has no FBX, so no new 3D asset). NEVER mutate d6/d20 or any existing kind. Commit dice-lib straight to main (do NOT cut a feature branch — branching the shared working copy would switch oq-1/2/4 too). DieKind union + dieRegistry entry + dF.ts + glyph-label generalization (face carries a label string defaulting to String(number)).
      - server: FATE_STATE / FateRollPayload spine must carry the 4dF tuple to the client (the dice tuple currently lives only on the OTEL span — F3 is NOT pure-UI; mirrors ADR-136 RELATIONSHIPS).
      - ui: InlineDiceTray (or a fate variant) wires kind='dF', count=4, sums faces→shift, renders ladder/tier/style overlay; fate-ruleset gate + negative co-render test.

      Depends on 118-1 (done). Critical path F3a->F3b already landed; F3c not gated by F4/F5.
    points: 5
    priority: p3
    status: done
    started: '2026-06-15'
    repos: server,ui
    workflow: spdd
    depends_on: 118-1
    acceptance_criteria:
      - dice-lib registers an additive dF DieKind — a d6 cube (box geometry, D6_RADIUS, d6 collider) reading Fudge faces {+1,0,-1} ×2 with glyph labels, without mutating d6 or letting dieKindForSides resolve to dF.
      - 'Server promotes the 4dF roll onto the wire: a strict FateRollPayload (four faces, ladder rating+name, shifts, tier, succeed-with-style) built from FateOutcome and carried on a routable FATE_ROLL message.'
      - UI can route FATE_ROLL — FateRollPayload type, isFateRoll guard, MessageType.FATE_ROLL, and FateRollMessage in the TypedGameMessage union.
      - A fate-gated FateDiceTray renders four dF dice and the legible readout (shift/ladder/tier/succeed-with-style) and renders nothing off a fate ruleset (never co-renders with the WN/native ConfrontationOverlay).
    completed: '2026-06-15'
    review_verdict: approved
