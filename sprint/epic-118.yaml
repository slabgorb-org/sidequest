  - id: 118-7
    title: 'F3g — wire the 4dF roll surface end-to-end: FATE_ROLL into the FatePanel + MP broadcast (carries 118-3 findings)'
    description: "Carries the deferred/non-blocking findings from 118-3 (F3c). 118-3 delivered the dF Fudge die (dice-lib, live), the server FateRollPayload/FATE_ROLL message + handler emit, and the FateDiceTray component + isFateRoll guard — but the roll surface is not yet wired into the live client. CORRECTION to the 118-3 session note: F3b (118-2) IS done — FatePanel.tsx + FATE_STATE routing (useStateMirror.ts:251) + fateState slice + FateWidget all exist on develop; the 118-3 'F3b absent' finding was clone-drift (the Dev feat branch predated 118-2's merge). So the mount is now feasible: the client can gate on gameState.fateState != null (FATE_STATE only arrives on ruleset=='fate' packs). Depends on 118-3 (done)."
    points: 3
    priority: p2
    status: backlog
    repos: server,ui
    workflow: tdd
    acceptance_criteria:
      - 'UI mount: route FATE_ROLL via isFateRoll in useStateMirror/App into a latest-roll slice; mount FateDiceTray in the FatePanel/FateWidget, gated on fate-pack presence (gameState.fateState != null). Today FateDiceTray + isFateRoll have NO production consumer.'
      - "MP broadcast: FATE_ROLL is currently delivered sender-only via the per-socket out_queue (websocket.py:133-135) — in multiplayer the rest of the table never sees the acting PC's roll. Broadcast via session._room.broadcast like DICE_RESULT (websocket_session_handler.py:1263) so peers see the soloist's roll (SOUL Guitar Solo). Fix the now-misleading 'broadcasts the same result to the table' comment in handlers/fate_action.py."
      - "Attribution: stamp player_id=acting_player_id on FateRollMessage (currently '') so a consumer can attribute whose roll it is — flagged by both security and edge-hunter reviewers."
      - "Glyph consistency: FateDiceTray faceGlyph(0) returns '0' but the dF die label for a blank face is '' — the table sees '+ + 0 -' vs the die's blank face. Pick one (lean: '0' is clearer for Sebastien/Jade legibility, or blank for Fudge canon) and make the die + text readout agree."
      - 'Stretch: carry throw_params/seed on FATE_ROLL (like DICE_RESULT) so the 3D Fudge dice animate to the actual rolled faces; today they render the idle pickup row (decorative) and only the text readout is authoritative.'
  - id: 118-8
    title: 'Fate FATE_ACTION auth-bypass: drive seat resolution from authenticated identity, not msg.player_id (ADR-119) + sanitize skill field'
    description: "HIGH-severity security finding surfaced during 118-3 (F3c) review (Hermes/reviewer-security, high confidence). PRE-EXISTING — not introduced by 118-3 (the seat-resolution lines are unchanged by that diff) — but 118-3 amplifies it: the spoofer now receives the victim's roll result. Relates to ADR-119 (Authenticated Player Identity, partial). Filed p1 so it is not lost."
    points: 3
    priority: p1
    status: done
    started: '2026-06-15'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - "Auth-bypass fix: in handlers/fate_action.py the acting player is resolved as 'acting_player_id = getattr(msg, \"player_id\", \"\") or sd.player_id'. A client can send a FATE_ACTION with a non-empty spoofed player_id pointing at another seated player, and the handler then acts AS that PC — sealing their commit, spending their fate point, or invoking their aspect. Drive seat resolution from sd.player_id (server-authenticated, Cf-Access identity bound at connect) as the SOLE source; treat msg.player_id as a server-set OUTPUT annotation, never trusted inbound identity."
      - "Add a regression test: a FATE_ACTION whose msg.player_id != the socket's authenticated identity must NOT act as the spoofed seat (it acts as the authenticated PC, or is rejected loud)."
      - 'Latent injection (LOW, ADR-047): FateActionPayload.skill is stored on FateSealedCommit (fate_conflict.py) WITHOUT sanitize_player_text — unlike aspect_text/boost.text which sanitize with explicit ADR-047 citations. No current narrator hint interpolates commit.skill, so it is latent, but apply sanitize_player_text(payload.skill) at the seal site to match the defensive posture before any future hint references it.'
    completed: '2026-06-15'
    type: bug
    review_verdict: approved
