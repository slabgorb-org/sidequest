id: '118'
type: epic
title: F3 — Fate Core UI surfaces (ADR-144)
description: "ADR-144 F3 slice: player-facing Fate Core UI for the four narrative packs (pulp_noir, tea_and_murder, wry_whimsy, spaghetti_western). Reactive Fate panel (fate points, aspects+invoke, skill ladder, stress boxes, consequence slots), 4dF roll display, compel accept/refuse. KEY FINDING (Neo Architect pass 2026-06-15): nothing Fate-shaped is on the wire to the client today — FateActionPayload is client->server intent only; the 4dF dice tuple lives only on the OTEL span — so F3 is NOT pure-UI. Its spine is a new FATE_STATE reactive projection+message (server) consumed by a new panel (ui), mirroring ADR-136 RELATIONSHIPS. Player-facing math mandatory (Sebastien/Jade) — player-UI mandate, NOT OTEL/GM-panel. Every Fate surface ruleset=='fate'-gated so it never co-renders with the WN/native beat/dial ConfrontationOverlay (paired negative test required). F1+F2 done; F3 not gated by F4/F5. Critical path F3a->F3b. Parked open Qs: 4dF flat-readout vs 3D Fudge die (gates F3c), compel carrier aside-channel vs in-panel control (gates F3e)."
priority: p2
status: backlog
repos: server,ui
stories:
  - id: 118-1
    title: "F3a — FATE_STATE reactive projection + wire message (the spine): promote build_fate_projection into a full client payload (per-PC fate_points/refresh, skills->ladder, all aspects+kind+free-invoke counts, stress boxes, consequence slots; scene situation aspects+boosts; conflict sides/turn order). Add FATE_STATE GameMessage+payload (model on RELATIONSHIPS/QUESTS in protocol/), an on-change emitter gated pack.rules.ruleset=='fate' (Cost-Scales-with-Drama, NOT per-turn), and fate.projection.emitted OTEL span. No UI. Mirrors ADR-136 RELATIONSHIPS. Files: game/ruleset/fate_projection.py, game/fate_sheet.py, protocol/, telemetry/spans/fate.py."
    points: 5
    priority: p2
    status: done
    started: '2026-06-15'
    repos: server
    workflow: tdd
    completed: '2026-06-15'
    review_verdict: approved
  - id: 118-2
    title: 'F3b — Fate panel (read surface): new FatePanel.tsx (dockview, mirror RelationshipsPanel/QuestsPanel) rendering per-PC fate-point count, aspect list grouped by kind (high-concept/trouble/character/situation/boost/consequence) with free-invoke pips, skills on the ladder (Terrible -2 .. Legendary +8, labels + numeric), consequence slots (mild/moderate/severe/extreme, filled vs open). Wire a fateState slice into useStateMirror + GameStateProvider (idempotent full-replace, null-guard, No-Silent-Fallback malformed-payload log) and register in GameBoard. Genre-themed CSS custom props. THE mechanics-legibility surface for Sebastien/Jade — all numbers labeled.'
    points: 5
    priority: p2
    status: done
    started: '2026-06-15'
    repos: ui
    workflow: tdd
    depends_on: 118-1
    completed: '2026-06-15'
    review_verdict: approved
  - id: 118-3
    title: 'F3c — 4dF roll display (dice surface): surface the 4dF result to the player — four Fudge faces {-,0,+}, ladder rating, shifts, outcome tier, succeed-with-style highlight. DEFAULT shape = flat readout in the Fate panel/narration (roll rides FATE_STATE or a small FateRollPayload). PARKED OPEN Q (Keith decides before RED): flat readout (3pt, tdd) vs extend the Rapier 3D overlay with a Fudge die derived from dice-lib d6.ts + GENRE_DICE_THEMES (5pt, superpowers, design-heavy, touches live WN/native dice path — add NEW die kind, never mutate d6). Filed at the flat default. Player sees faces+ladder+shift+tier regardless (legibility mandate).'
    description: |-
      F3c — 4dF roll display (3D Fudge die). RESOLVED 2026-06-15 (Keith): Option B — extend the Rapier 3D dice overlay with a real Fudge die, NOT the flat readout. Player sees four Fudge faces {+,0,−}, ladder rating, shift total, outcome tier, succeed-with-style highlight (legibility mandate — Sebastien/Jade, player-UI not OTEL). ruleset=='fate'-gated; must never co-render with the WN/native ConfrontationOverlay (paired negative test required).

      SCOPE = 3 repos: server, ui, dice-lib.
      - dice-lib (~/Projects/dice-lib, @local/dice-lib, trunk-based on main; ONE shared working copy symlinked into every oq clone via file:../../dice-lib — a local edit is live in all clones instantly, source-linked, no build): add a NEW 'dF' DieKind ADDITIVELY to DIE_REGISTRY. The Fudge die is a d6 cube — reuse D6_RADIUS / D6_COLLIDER_VERTICES / geometryKind 'box'; new face→value map {+1,0,−1} ×2 each; render glyphs via the existing procedural FaceLabels + drei <Text> path (dF has no FBX, so no new 3D asset). NEVER mutate d6/d20 or any existing kind. Commit dice-lib straight to main (do NOT cut a feature branch — branching the shared working copy would switch oq-1/2/4 too). DieKind union + dieRegistry entry + dF.ts + glyph-label generalization (face carries a label string defaulting to String(number)).
      - server: FATE_STATE / FateRollPayload spine must carry the 4dF tuple to the client (the dice tuple currently lives only on the OTEL span — F3 is NOT pure-UI; mirrors ADR-136 RELATIONSHIPS).
      - ui: InlineDiceTray (or a fate variant) wires kind='dF', count=4, sums faces→shift, renders ladder/tier/style overlay; fate-ruleset gate + negative co-render test.

      Depends on 118-1 (done). Critical path F3a->F3b already landed; F3c not gated by F4/F5.
    points: 5
    priority: p3
    status: done
    started: '2026-06-15'
    repos: server,ui
    workflow: spdd
    depends_on: 118-1
    acceptance_criteria:
      - dice-lib registers an additive dF DieKind — a d6 cube (box geometry, D6_RADIUS, d6 collider) reading Fudge faces {+1,0,-1} ×2 with glyph labels, without mutating d6 or letting dieKindForSides resolve to dF.
      - 'Server promotes the 4dF roll onto the wire: a strict FateRollPayload (four faces, ladder rating+name, shifts, tier, succeed-with-style) built from FateOutcome and carried on a routable FATE_ROLL message.'
      - UI can route FATE_ROLL — FateRollPayload type, isFateRoll guard, MessageType.FATE_ROLL, and FateRollMessage in the TypedGameMessage union.
      - A fate-gated FateDiceTray renders four dF dice and the legible readout (shift/ladder/tier/succeed-with-style) and renders nothing off a fate ruleset (never co-renders with the WN/native ConfrontationOverlay).
    completed: '2026-06-15'
    review_verdict: approved
  - id: 118-4
    title: "F3d — Invoke control: player-driven invoke from the Fate panel — an 'Invoke (+2 / reroll)' affordance per invokable aspect showing cost (free invoke if available, else 1 fate point). Resolution already rides FateActionPayload.invoke_aspect (F1d/F2a); F3d builds the control + cost display + optimistic fate-point decrement reconciled by next FATE_STATE (server is the only economy authority — No Silent Fallbacks). Surfaces the F2b invokable-aspect directive as clickable UI instead of prose."
    description: 'CANCELED (2026-06-15, Bossmang ruling) — folded into 118-6 (F3f Fate conflict surface), the only legitimate host for the invoke affordance (invoke is a rider on a seated proactive action, encounter-gated). Original standalone-invoke spec was unbuildable: FateActionPayload has no standalone invoke / no kind / no aspect_id / no reroll-over-wire; invoke is a +2 text-rider, economy server-authoritative. The F3d invoke scope now lives in 118-6; server wire prerequisites in 118-10 (invoke_mode/reroll + player_action freeform rider).'
    points: 3
    priority: p3
    status: canceled
    started: '2026-06-15'
    repos: ui
    workflow: tdd
    depends_on: 118-2
    branch: feat/118-4-f3d-fate-invoke-control
  - id: 118-5
    title: "F3e — Compel accept/refuse round-trip (closes the F2b deferral): F2b's propose_fate_compel fires fate.compel.offered but the engine never persisted a PendingCompel (F2b plan suggested one; shipped flow is stateless). F3e adds the accept/refuse routing seam (server) + the player surface (ui): Accept -> module.accept_compel (+1 fate point, fires fate.compel.accepted); Refuse -> pay 1 fate point to decline (SRD). Show the fate-point delta on resolve. PARKED OPEN Q (Keith decides before RED): carrier = ADR-107 aside channel vs dedicated in-panel control."
    points: 5
    priority: p3
    status: backlog
    repos: server,ui
    workflow: tdd
    depends_on: 118-2
  - id: 118-6
    title: "F3f — Fate conflict surface (host for F3d invoke; 118-4 folded in): during an active Fate Conflict show the live exchange — sides, turn order, each attack's shifts -> which stress boxes checked / which consequence filled (absorption math, legibility), taken-out, proactive-action tiles (overcome/create_advantage/attack), a Concede control (pre-roll -> fate points + narrative control), and the F3d invoke affordance. Reuses ConfrontationOverlay as the mount precedent but renders Fate state, ruleset=='fate'-gated so it never collides with the WN/native beat overlay. Much rides on FATE_STATE (F3a) + the panel (F3b)."
    description: "UN-TRIMMED + F3d FOLDED IN (2026-06-15, Bossmang ruling — the earlier '(TRIM CANDIDATE)' framing is RESCINDED; this is now load-bearing). F3f = the Fate conflict surface AND the host for the F3d invoke affordance (118-4 canceled, folded here). Fate ANALOG of ConfrontationOverlay — reuses the mount PATTERN, NOT the native dial/beat internals (Fate replaces those, ADR-143); ruleset=='fate'-gated. SCOPE: live exchange (sides, turn order, shifts -> stress/consequence absorption math, taken-out) + proactive-action tiles (overcome/create_advantage/attack) + Concede control (pre-roll -> fate points) + the F3d INVOKE affordance (clickable per-aspect Invoke, keyed on aspect TEXT, +2 or reroll, free-invoke-then-fate-point shown; economy server-authoritative, panel reflects FATE_STATE, NO optimistic decrement) + freeform-text-rides-the-tile (type 'I swing from the chandelier and fire' + click the verb -> rides via FateActionPayload.player_action -> narrator prose, 'chandelier for free'). Composes FatePanel (118-2, mounted) + FateDiceTray (118-3, built, not yet mounted). Identity server-authenticated (118-8). Negative tests: non-Fate guard, sealed-commit-barrier disable, invoke disabled at no-free-invoke+0-fate. DEPENDS ON 118-10 (invoke_mode + player_action wire)."
    points: 8
    priority: p2
    status: backlog
    repos: server,ui
    workflow: tdd
    depends_on: 118-2
    acceptance_criteria:
      - "REROLL EXECUTION (from 118-10 finding R2): when invoke_mode='reroll', the SERVER must actually reroll the 4dF AND emit an OTEL span attesting the reroll OUTCOME. 118-10 only carries the mode over the wire — ruleset.invoke_aspect returns 0 for reroll ('the reroll itself is the caller's job') and dispatch_fate_action performs NO reroll. Do NOT ship a reroll button/affordance before the server-side reroll is implemented, or a player spends a fate-point/free-invoke for a no-op that the GM panel's fate.aspect.invoked{mode='reroll'} span falsely reports as a reroll (Illusionism/El Dorado failure)."
      - 'player_action SANITIZATION (from 118-10 finding R1, ADR-047): when threading FateActionPayload.player_action into narrator prose, make an explicit sanitization decision — the dice precedent threads it RAW (ephemeral self-action flavor, dice.py:285/312) vs the in-file sanitize_player_text convention used for narrator-bound freeform (payload.skill at the seal site; aspect.text→narrator_hints, the 116-4 [HIGH][SEC] fix). 118-10 leaves player_action reaching ONLY the OTEL span (no narrator path yet); do not inherit the gap unconsidered.'
      - "CONCEDE + player_action (from 118-10 finding R3): the fate.action.flavor_rider span fires only on proactive actions (it sits AFTER the action=='concede' early-return in dispatch_fate_action). Decide whether a concession carrying freeform text emits the rider / threads to the narrator, or is intentionally rider-less."
  - id: 118-7
    title: 'F3g — wire the 4dF roll surface end-to-end: FATE_ROLL into the FatePanel + MP broadcast (carries 118-3 findings)'
    description: "Carries the deferred/non-blocking findings from 118-3 (F3c). 118-3 delivered the dF Fudge die (dice-lib, live), the server FateRollPayload/FATE_ROLL message + handler emit, and the FateDiceTray component + isFateRoll guard — but the roll surface is not yet wired into the live client. CORRECTION to the 118-3 session note: F3b (118-2) IS done — FatePanel.tsx + FATE_STATE routing (useStateMirror.ts:251) + fateState slice + FateWidget all exist on develop; the 118-3 'F3b absent' finding was clone-drift (the Dev feat branch predated 118-2's merge). So the mount is now feasible: the client can gate on gameState.fateState != null (FATE_STATE only arrives on ruleset=='fate' packs). Depends on 118-3 (done)."
    points: 3
    priority: p2
    status: backlog
    repos: server,ui
    workflow: tdd
    acceptance_criteria:
      - 'UI mount: route FATE_ROLL via isFateRoll in useStateMirror/App into a latest-roll slice; mount FateDiceTray in the FatePanel/FateWidget, gated on fate-pack presence (gameState.fateState != null). Today FateDiceTray + isFateRoll have NO production consumer.'
      - "MP broadcast: FATE_ROLL is currently delivered sender-only via the per-socket out_queue (websocket.py:133-135) — in multiplayer the rest of the table never sees the acting PC's roll. Broadcast via session._room.broadcast like DICE_RESULT (websocket_session_handler.py:1263) so peers see the soloist's roll (SOUL Guitar Solo). Fix the now-misleading 'broadcasts the same result to the table' comment in handlers/fate_action.py."
      - "Attribution: stamp player_id=acting_player_id on FateRollMessage (currently '') so a consumer can attribute whose roll it is — flagged by both security and edge-hunter reviewers."
      - "Glyph consistency: FateDiceTray faceGlyph(0) returns '0' but the dF die label for a blank face is '' — the table sees '+ + 0 -' vs the die's blank face. Pick one (lean: '0' is clearer for Sebastien/Jade legibility, or blank for Fudge canon) and make the die + text readout agree."
      - 'Stretch: carry throw_params/seed on FATE_ROLL (like DICE_RESULT) so the 3D Fudge dice animate to the actual rolled faces; today they render the idle pickup row (decorative) and only the text readout is authoritative.'
  - id: 118-8
    title: 'Fate FATE_ACTION auth-bypass: drive seat resolution from authenticated identity, not msg.player_id (ADR-119) + sanitize skill field'
    description: "HIGH-severity security finding surfaced during 118-3 (F3c) review (Hermes/reviewer-security, high confidence). PRE-EXISTING — not introduced by 118-3 (the seat-resolution lines are unchanged by that diff) — but 118-3 amplifies it: the spoofer now receives the victim's roll result. Relates to ADR-119 (Authenticated Player Identity, partial). Filed p1 so it is not lost."
    points: 3
    priority: p1
    status: done
    started: '2026-06-15'
    repos: server
    workflow: tdd
    acceptance_criteria:
      - "Auth-bypass fix: in handlers/fate_action.py the acting player is resolved as 'acting_player_id = getattr(msg, \"player_id\", \"\") or sd.player_id'. A client can send a FATE_ACTION with a non-empty spoofed player_id pointing at another seated player, and the handler then acts AS that PC — sealing their commit, spending their fate point, or invoking their aspect. Drive seat resolution from sd.player_id (server-authenticated, Cf-Access identity bound at connect) as the SOLE source; treat msg.player_id as a server-set OUTPUT annotation, never trusted inbound identity."
      - "Add a regression test: a FATE_ACTION whose msg.player_id != the socket's authenticated identity must NOT act as the spoofed seat (it acts as the authenticated PC, or is rejected loud)."
      - 'Latent injection (LOW, ADR-047): FateActionPayload.skill is stored on FateSealedCommit (fate_conflict.py) WITHOUT sanitize_player_text — unlike aspect_text/boost.text which sanitize with explicit ADR-047 citations. No current narrator hint interpolates commit.skill, so it is latent, but apply sanitize_player_text(payload.skill) at the seal site to match the defensive posture before any future hint references it.'
    completed: '2026-06-15'
    type: bug
    review_verdict: approved
  - id: 118-9
    title: 'ADR-119/ADR-047 hardening: audit dice_throw seat-auth (mirrors the 118-8 spoof pattern) + sanitize target/aspect_text at the Fate seal site'
    description: "Follow-up hardening filed during the 118-8 review (The Merovingian, 2026-06-15). Bundles three ADR-119 (Authenticated Player Identity) / ADR-047 (Prompt Injection Sanitization) findings that were pre-existing and out of scope for 118-8 (which scoped to FATE_ACTION + the skill field only). (1) AUTH AUDIT: DiceThrowHandler (sidequest/handlers/dice_throw.py) is the explicit pattern FateActionHandler mirrored ('mirrors DiceThrowHandler' docstring) and very likely carries the same auth-trust idiom 'getattr(msg, \"player_id\", \"\") or sd.player_id' — i.e. the same seat-spoof exposure 118-8 fixed for Fate. If confirmed, this is a potential HIGH (same class as 118-8, which was p1). (2)+(3) SANITIZATION: in sidequest/server/dispatch/fate_conflict.py, payload.target and payload.aspect_text are sealed RAW onto FateSealedCommit right beside the now-sanitized skill. target is MEDIUM (commit.target is interpolated into _resolve_attack narrator hints at ~:521-547, but _resolve_attack raises at find_creature_core(commit.target) ~:503 before any hint, so a free-text injection target raises rather than reaching the LLM — the active path needs a maliciously-named actor). aspect_text is LOW/latent (already sanitized at the hint producer _resolve_create_advantage 590/606 AND the prompt projection fate_projection.py:65; raw survives only on the F3a display-only projection). Apply sanitize_player_text at the seal site for defense-in-depth consistency with the 118-8 skill fix."
    points: 3
    priority: p2
    status: backlog
    repos: server
    workflow: tdd
    acceptance_criteria:
      - 'dice_throw: audit DiceThrowHandler seat resolution; if it trusts inbound msg.player_id, drive it from sd.player_id as the SOLE source (mirror 118-8), with an anti-spoof regression test and a fate_action-style spoof watcher event. If the audit finds it already safe, document why and close that AC.'
      - 'fate_conflict: sanitize payload.target via sanitize_player_text at the seal site in dispatch_fate_action (or commit.target at the _resolve_attack hint sites), with a test proving an injection-bearing target name is neutralized in the stored/hinted value.'
      - 'fate_conflict: sanitize payload.aspect_text at the seal site to remove the raw-on-struct surface, keeping the existing hint-time + projection-time sanitization as defense-in-depth; test that the stored commit.aspect_text is sanitized.'
    type: bug
  - id: 118-10
    title: 'F3d-pre (server) — Fate invoke_mode (bonus|reroll) over the wire: add invoke_mode to FateActionPayload + thread through dispatch_fate_action (currently hardcodes bonus) into ruleset.invoke_aspect, mirror via F1d handler + F2a subsystem, extend fate_aspect_invoked OTEL span with mode; optional stable aspect_id in FATE_STATE projection. Unblocks the reroll half of F3d (118-4).'
    description: "Server prerequisites for the Fate conflict surface (118-6) + invoke (F3d/118-4). TWO additions to FateActionPayload + dispatch: (a) invoke_mode: Literal['bonus','reroll']='bonus' threaded through dispatch_fate_action (currently hardcodes mode='bonus') into ruleset.invoke_aspect; mirror via F1d handler + F2a subsystem; extend fate_aspect_invoked OTEL span with mode. (b) player_action: str='' freeform action-text rider mirroring DiceThrowPayload.player_action — thread into the narrator's player_action context (orchestrator player_action_text) so 'I swing from the chandelier and fire' + the mechanical Fate action reach the prose together ('chandelier for free'). Optional: stable aspect_id in FATE_STATE projection. Unblocks reroll + freeform-rides-action for F3d."
    points: 3
    priority: p2
    status: done
    started: '2026-06-16'
    repos: server
    workflow: tdd
    completed: '2026-06-16'
