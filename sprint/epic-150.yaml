  - id: 150-2
    title: '[PLAYTEST] spaghetti_western/dust_and_lead — full-stack verify (fate)'
    description: |-
      Full-stack /sq-playtest verification of spaghetti_western/dust_and_lead (ruleset: fate). Confirm in play: Fate engine engages (FATE_ROLL + fate.* + confrontation.* spans), harm ablates stress/consequences not core.hp (126-1), FATE_STATE hydrates on connect/resume (#942), items become invokable aspects (#945), Contest resolves opposed checks (#936), 4dF determinative (126-7), native Inventory hidden (126-3). Poker/table game live: trigger a table scene and confirm router-driven seating (126-2). Execute via /sq-playtest full-stack (UI + Playwright + UX Designer); bugs via ping-pong to FIXER.

      --- GM GAP-DRIVE CLOSEOUT (2026-06-19, slug 2026-06-19-dust_and_lead-97fbb4b2, PC Wren Halloway) ---
      Spine was already VERIFIED end-to-end this morning (seat->attack->4dF->defend->harm ablation). This run was a FOCUSED gap-drive on the previously-unverified ACs. Server on feat/fate-opponent-projection @ 32a63f04 (develop+1), content develop. 3 game turns, social scene.

      VERIFIED THIS RUN:
      - #945 CHARGEN signature-gear -> invokable Fate aspect: GREEN. All 4 gear.yaml grants_aspects compiled onto the stored Fate sheet (3 kind=character invokable + 1 kind=permission), UI-correct under Character/Permission. CONTRADICTS annees_folles finding #1 (0 gear aspects) -> that failure is pulp_noir-specific, NOT the Fate engine. So #945's promotion mechanism works.
      - #960 must_not_narrate: CLEAN under a deliberate hidden-info probe (belief firewall held: tell + deflection, no leak).
      - ui#419 visible Fate inventory: WORKS (gained map shown with description).
      - Agency/The Test PASS (3 turns); genre-true prose; chargen completes clean (narrative wizard + portrait); FATE_STATE hydrates; no native HP/Lv/class chrome leak (126-19A no-repro); zero session console errors.
      - #126-2 router table seating: covered by the prior verified spine (no conflict seated this social run).

      OPEN / FOLLOW-UP (logged to pingpong -> FIXER/Keith):
      - [QUESTION/#945 on-play] An ad-hoc significant item gained in play (surveyor's map) lands in native core.inventory.items but does NOT promote to an invokable aspect/extra. Reading (a) model-correct (no grants_aspects authored on an ad-hoc item -> nothing to promote; chargen path satisfies the AC) vs (b) native inventory shouldn't be used under Fate / significant items should become story-aspects. KEITH crunch call. GM rec: #945 AC is effectively satisfied by the chargen path; treat on-play significant-item->aspect as a separate enhancement.
      - [UX-LOW] dust_and_lead opening uses party-scale framing in solo (four glasses / 'waits for the party' / 'two riders'). Content + narrator both assume a table.
      - [namegen #5 data-point] authored-unnamed drifter minted 'Faye Smith' (generic Anglo + feminine-leaning for a he/him sangre_frontera NPC).

      DISPOSITION: spine + Fate binding suite VERIFIED for dust_and_lead -> in_review, staged for SM finish (mirrors 150-1). The #945 on-play question is a separate crunch/enhancement item, not a verification blocker.
