id: '150'
type: epic
title: Full-stack playtest verification — ruleset bindings, per-world health, recent-fix regression
description: "Full-stack playtest verification sweep across all 22 live worlds (11 genres, 5 ruleset bindings). Each story is a /sq-playtest full-stack run (real UI + Playwright + UX Designer) of ONE world, verifying three things in one pass: (1) the world's RULESET BINDING delivers in play — the Fate / Without-Number engine engages, OTEL spans fire in the GM panel (the lie detector); (2) per-world HEALTH — loads, connects, chargen completes, a multi-turn session runs, narration is genre-true, UI controls are wired (no dead controls); (3) recent-fix REGRESSION — the merged sprint work touching that world's stack holds at the table, not just in unit tests. Bugs reported cross-workspace via the ping-pong file to FIXER. WAVE 1 (p2) = the 9 Fate worlds (ADR-144 binding live + this sprint's Fate work: Contest #936, item-aspects #945, FATE_STATE hydrate #942, fate-chargen #941, harm-routing 126-1, native-inventory-hide 126-3, determinative 4dF 126-7); pulp_noir/annees_folles also closes 126-10 AC1/AC4 (router latency 37-81s→~4-6s + routing accuracy survives the projection trim). WAVE 2 (p3) = the 13 Without-Number-family worlds (WWN/CWN/AWN/SWN), held at p3 until the in-flight WN-owns-the-round combat work (epic-108 / ADR-143) stabilizes — a full-stack combat verify there will surface that KNOWN beat-pool breakage. Cost is not a constraint: narrator inference runs free on the Max subscription via the Anthropic SDK."
priority: p2
status: backlog
repos: ui,server,content,daemon
stories:
  - id: 150-1
    title: '[PLAYTEST] pulp_noir/annees_folles — full-stack verify (fate) + 126-10 AC1/AC4'
    description: 'Full-stack /sq-playtest verification of pulp_noir/annees_folles (ruleset: fate). The marquee Fate world + the 126-10 anchor. Confirm in play: Fate-conflict harm ablates stress/consequences not core.hp (126-1); FATE_STATE hydrates on connect/resume (#942); items gained become invokable aspects (#945); Contest engine resolves opposed checks (#936); player 4dF is determinative (126-7); native Inventory tab hidden for Fate (126-3); router-driven table seating (126-2). 126-10 specifics: intent_router_pass ~4-6s (NOT 37-81s) on the GM-panel Timeline + the intent_router.fate_vocabulary span shows bytes_after<bytes_before; routing accuracy survives the aspect trim (create_advantage/invoke still classify). Execute via /sq-playtest full-stack (UI + Playwright + UX Designer); report bugs cross-workspace via ping-pong to FIXER.'
    points: 2
    priority: p2
    status: backlog
    repos: ui,server,content,daemon
    workflow: trivial
    acceptance_criteria:
      - World loads, connects, and chargen completes through the real UI (no GameBoard crash — confirm the 'thresholds is not iterable' fix ui#408 holds).
      - A multi-turn Fate session runs end-to-end; FATE_STATE renders (aspects/skills/fate points/stress) and hydrates on reconnect.
      - '126-10 latency: GM-panel Timeline shows intent_router_pass at ~4-6s, not 37-81s; intent_router.fate_vocabulary span fires with bytes_after<bytes_before.'
      - 'Seat a Fate conflict: FATE_ROLL + fate.* + confrontation.* OTEL spans fire (lie detector); harm ablates Fate stress/consequences, core.hp untouched (126-1).'
      - 'Routing accuracy: a create_advantage / invoke-an-aspect action still classifies correctly despite the router no longer carrying live aspects (126-10 AC2).'
      - Narration is genre-true (hardboiled 1920s Paris); no dead UI controls; any finding filed via ping-pong to FIXER.
    type: chore
