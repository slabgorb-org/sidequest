id: '153'
type: epic
title: Intent Router output-slim — cut per-turn latency at the output contract
description: "Cut the IntentRouter's per-turn latency at its output contract. Diagnosed 2026-06-20 (headless latency_diag_82_9 + Jaeger spans): latency is 100% in-SDK, zero-retry, single-iteration, with NO confidence correlation but a 0.94 correlation with output_tokens — p50 8.6s / p95 18.4s / max 26.6s on a DispatchPackage that accreted fields nothing reads (resolved[], action_rewrite.you, the router's lethality[]). Fix: cut the dead/redundant fields, server-default VisibilityTag, reorder so narrator-critical fields generate first, slim the system prompt. Server-only; no UI, no 2nd LLM call (the async-enrichment tier was verified empty). Spec: docs/superpowers/specs/2026-06-20-intent-router-output-slim-design.md. Plan: docs/superpowers/plans/2026-06-20-intent-router-output-slim.md. Future stories under this epic: the parked clarify-loop (quality + Epic-48 local-router tuning data), narrator-honors-mechanical-death compliance, local-Qwen router migration."
priority: p1
status: done
