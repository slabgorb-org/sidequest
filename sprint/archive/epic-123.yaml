description: The server suite carries a large pre-existing failure baseline (~171 failures on a full run, surfaced during 114-15 and verified to be unrelated to it). The dominant cause is SDK-hermeticity (~174 LlmClientError from build_async_anthropic — tests reach the real Anthropic SDK without installing a fake, tripping the autouse _no_real_anthropic_sdk guard from story 93-1), plus a snapshot-field governance miss (pending_quest_offers, 117-3) and DB-state integration failures. A noisy baseline masks real regressions on every story (subagents mislabel real breakage as 'pre-existing'). This epic root-causes the buckets (local-env/stale-tree vs a genuine develop regression FIRST), fixes the non-deliberate ones, and quarantines or documents the deliberate in-flight ones (the WWN class beat-pool loader failures belong to epic-108 de-nativization, not here).
