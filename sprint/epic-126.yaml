  - id: 126-14
    title: '[FATE] Reconcile concede-at-defend: AC-4 (server records concession) vs AC-6 (no wire) — add a defend-concession protocol field or remove the dead conceded branches'
    description: "Wire defend-concession end-to-end on the SERVER (Keith decision 2026-06-19; re-scoped server-only 2026-06-19 after The Man in Black verified the UI has no Fate defend surface — the UI concede affordance moved to new story 126-17 which builds the whole defend tray). The engine branches already exist from 126-8 but have no production caller: dispatch_fate_defense(conceded=...), the _resolve_attack concede branch (fate_conflict.py:612), the 'ledger_full ... or p.conceded' clause (fate_conflict.py:1231), and FatePendingDefense.conceded. This story adds the protocol concede field + _handle_defend plumbing + OTEL so the dead branches become live. NOTE: story YAML repos still reads 'server,ui' (the update CLI has no --repos flag); the SESSION Repos line (server) is authoritative — see the logged deviation. UI work is tracked in 126-17."
    points: 3
    priority: p3
    status: done
    started: '2026-06-19'
    repos: server,ui
    workflow: tdd
