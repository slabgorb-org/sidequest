  - id: 126-10
    title: '[PERF/FATE] intent_router_pass 37-81s spikes on Fate worlds — trim build_fate_projection router prompt (separate from 126-9 narrator fix)'
    description: |-
      Secondary finding from the 126-9 latency dig (bisect, MEDIUM confidence). SEPARATE mechanism from 126-9's narrator extended-thinking regression — this one is prompt bloat, not thinking.

      SYMPTOM: intent_router_pass phase spikes to 37-81s on a SINGLE call (phase_call_counts=1, so NOT thrash) on Fate worlds — observed on pulp_noir/annees_folles (one session avg 162s/turn). Non-Fate worlds show ~4-6s baseline for the same phase.

      MECHANISM: intent_router_pass.py:364-365 injects build_fate_projection (= build_fate_projection, the shared narrator/router projector at ~line 234: PC skills + ALL live aspects) into the router state_summary ONLY when pack.rules.ruleset=='fate'. This enlarges the router prompt. The router's single Haiku call is structured (output_format set, llm_factory.py:399-405) so #919 already disabled ITS thinking — so thinking-off (126-9) will NOT fix this. On the bloated Fate prompt the structured call intermittently can't land the finalize inside the mandatory max_turns=2 floor -> error_max_turns fragility, surfacing as a slow single call.

      WHY SEPARATE FROM 126-9: 126-9 fixes the narrator (agent_duration_ms, the dominant cost, HIGH confidence, thinking-off). This story is the router-phase Fate prompt bloat (MEDIUM confidence, needs the trim). Do 126-9 first; re-measure; this may shrink once general load drops, but the Fate prompt is the structural lever.

      LEVER: trim build_fate_projection for the ROUTER prompt (the router likely needs far less than the narrator — PC skills maybe, not every live aspect). Confirm empirically on annees_folles turn_telemetry before/after.
