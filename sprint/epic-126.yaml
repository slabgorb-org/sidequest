      - Trim build_fate_projection for the router prompt so intent_router_pass on Fate worlds returns to ~baseline (~4-6s) without breaking Fate routing accuracy.
      - No error_max_turns fragility on Fate turns after the trim (the structured call finalizes within max_turns=2).
