id: '124'
type: epic
title: OTEL Inspector — Tufte visualization follow-ups
description: Follow-ups to the 2026-06-16 Tufte redesign of the SideQuest Inspector (PR slabgorb-org/sidequest-ui#398). Two design features from the Claude Design handoff were deferred because they depend on telemetry the engine does not currently emit; the redesign rendered only real TurnCompleteFields rather than fabricate data.
priority: p3
status: backlog
repos: server,ui
stories:
  - id: 124-1
    title: Timing token chart — per-turn cached/fresh split + cache-hit sparkline
    description: "The Tufte design splits per-turn tokens-in into cached (faded) vs fresh (solid) stacked bars, adds a cache-hit-rate sparkline with cold-start misses flagged in accent, and a 'served from cache' savings summary. BLOCKER at redesign time: cache_read / cache_hit / cold are NOT on the turn_complete event (TurnCompleteFields) — they live on prompt_assembled (PromptFields.cache_usage), which the Prompt tab already surfaces. Wiring options: (a) add a per-turn cache field to turn_complete server-side, or (b) join prompt_assembled cache_usage to turns by turn_number in the dashboard telemetryAdapter. Then extend charts/TokenBarChart.tsx to stack cached+fresh on the shared scale and add the hit-rate track. cache_usage can be null (non-SDK backends) — render only what's present, no fabrication (No Silent Fallbacks)."
    points: 5
    priority: p3
    status: done
    assigned_to: dev
    started: '2026-06-16'
    repos: server,ui
    workflow: tdd
    acceptance_criteria:
      - turn_complete (or a dashboard-side join) exposes per-turn cache_read / fresh_in / cache_hit / cold
      - TokenBarChart renders stacked cached(faded)+fresh(solid) in-bars on the shared honest scale
      - cache-hit-rate sparkline with cold-start turns flagged in accent + a cache-savings summary line
      - null cache_usage (non-SDK turns) renders honestly with no fabricated estimate
    completed: '2026-06-16'
    review_verdict: approved
  - id: 124-2
    title: Dependency-aware flame chart — emit + render span hierarchy
    description: 'The Tufte design renders the flame chart with dependency nesting: spans nested caller ▸ callee (containment = depth), faded container spans vs solid leaf work (Tufte layering), and the critical span outlined in accent. BLOCKER at redesign time: TurnSpan is FLAT (name, component, start_ms, duration_ms) — no parent/depth/leaf. The shipped FlameChart is therefore an honest time-proportional Gantt (one row per span, slowest outlined), NOT nested. To get nesting the server must emit span hierarchy (parent id or depth, and a leaf flag) on the turn_complete spans payload; charts/FlameChart.tsx then lays rows out by depth with container-vs-leaf opacity layering and keeps the accent outline on the critical span.'
    points: 5
    priority: p3
    status: backlog
    repos: server,ui
    workflow: tdd
    acceptance_criteria:
      - turn_complete spans carry hierarchy (parent/depth + leaf flag) sufficient to reconstruct the caller▸callee tree
      - FlameChart lays spans out by depth (nested), faded containers vs solid leaves
      - critical (bottleneck) span stays outlined in accent; flat-span fallback still works for older servers
  - id: 124-3
    title: Tufte-redesign the OTEL Inspector — palette across the shell + full Timing & Timeline rebuild
    description: "Implements the Claude Design 'tufte-inspired-visualization-improvements' handoff (SideQuest Inspector.dc.html, 2026-06-16) in the live OTEL Inspector. Filed retroactively — implemented directly at Keith's request (not via the SM→TEA→Dev pipeline). PR: slabgorb-org/sidequest-ui#398 (branch feat/inspector-tufte-redesign → develop), OPEN/awaiting merge. Scope: (1) bring the Tufte color scheme across the whole shell, (2) full Tufte rebuild of two tabs — Timing + Timeline. Palette recolored in shared/constants.ts (flat #19191b ground, #4ab4cf accent, muted agent hues, Georgia small-caps + JetBrains Mono); every legacy THEME key preserved so all nine tabs inherit it. Shell (Header/Tabs/App) restyled to hairline rules + flat ground; header gained a real p95 sparkline. Timing: stat row, phase bars w/ session-avg tick, histogram w/ median/p95 refs, per-agent dot plot, scatter w/ 5-turn mean + p95 + degraded X, shared-scale token bars, donut→sorted tier bar plot (DonutChart deleted). Timeline: Tufte turn list (session dividers preserved), flame Gantt w/ slowest span outlined, serif/mono detail grid. Driven entirely by real TurnCompleteFields; two data-blocked features cut to 124-1 (cache split) and 124-2 (flame nesting). Verification: tsc clean, full UI suite 2261/2261, Dashboard 70/70."
    points: 8
    priority: p2
    status: done
    started: '2026-06-16'
    repos: ui
    workflow: tdd
    acceptance_criteria:
      - Tufte palette applied across the whole Inspector shell (header, tab bar, sub-strip); all nine tabs inherit it via THEME
      - 'Timing tab fully rebuilt: stat row, phase bars w/ avg tick, histogram w/ median+p95 refs, agent dot plot, scatter w/ mean+p95+degraded X, shared-scale token bars, tiers as sorted bar plot (donut removed)'
      - 'Timeline tab fully rebuilt: Tufte turn list with session dividers preserved, flame Gantt with slowest span outlined, serif/mono detail grid'
      - Driven only by real telemetry — no fabricated fields; data-blocked design features cut to 124-1 and 124-2
      - tsc clean, full UI suite green (2261/2261), Dashboard suite green (70/70)
    completed: '2026-06-16'
  - id: 124-4
    title: "Inspector State tab — dark-Tufte treatment (124-3 follow-on): location/regions direct-labeled, tropes sorted progression bar plot, character HP bullet bar + inventory narrative-weight bars with named/evolved threshold ticks, NPC registry with 5-bar OCEAN personality sparkline fingerprints, working search filter — bound to LIVE SessionStateView (not the prototype's synthetic makeState). Per the epic no-fabrication rule: where the design shows OCEAN / trope progression / per-item narrative weight, verify those fields actually reach SessionStateView and wire the deferred telemetry (server) or render only what is real — do not fabricate. Design source: Claude Design handoff 'tufte-inspired-visualization-improvements', file 'SideQuest Inspector.dc.html' State tab; screenshots state2.png + state_npc.png."
    points: 5
    priority: p3
    status: done
    started: '2026-06-16'
    repos: server,ui
    workflow: tdd
    completed: '2026-06-16'
    review_verdict: approved
