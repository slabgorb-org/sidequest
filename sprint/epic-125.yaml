  - id: 125-4
    title: "F3g follow-up (118-7): animate the FateDiceTray 3D Fudge dice to the rolled faces (throw_params/seed) + align the dF blank-face label to '0'"
    description: |-
      Deferred from story 118-7 (ADR-144 F3g) — captured by TEA + Dev + Reviewer as non-blocking findings. Two coupled changes that together make the FateDiceTray's 3D Fudge dice show the ACTUAL rolled faces:

      (AC5 — the substantive half) Carry throw_params + seed on the FATE_ROLL message/payload (mirroring DICE_RESULT) so the 3D dice in FateDiceTray animate to the rolled faces instead of rendering the idle pickup row (throwParams=null). Touches: sidequest-server FateRollPayload (protocol/models.py) + build_fate_roll_payload (game/ruleset/fate_projection.py) to emit throw_params/seed; sidequest-ui FateDiceTray.tsx to pass throwParams through to DiceScene. NOTE: FateRollPayload is model_config extra='forbid' — adding fields is a deliberate protocol change.

      (AC4 — the 1-line coupled half) Align the dF die's blank-face label to '0'. The UI text readout already renders faceGlyph(0)='0' (pinned by a test in 118-7); the dice-lib die still labels its two blank Fudge faces '' (../dice-lib/src/dF.ts:22-23). Change those labels '' -> '0' so the 3D die and the text readout agree once the dice show real faces. Touches: ../dice-lib/src/dF.ts (+ a dice-lib test). Not player-visible until AC5 lands (dice are decorative/idle today), which is why they're bundled.

      Player-UI legibility mandate (Sebastien/Jade): the dice should show what was actually rolled. See 118-7 session archive (sprint/archive/118-7-session.md) Delivery Findings — TEA (test design) + Reviewer (code review).
    points: 3
