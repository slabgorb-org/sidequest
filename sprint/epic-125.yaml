stories:
  - id: 125-1
    title: 'Inspector token chart: hit-rate dot tooltip mislabels turn # when null turns interspersed'
    description: "From the 124-1 Reviewer audit. TokenBarChart.tsx:143 — the cache-hit-rate dot tooltip builds its turn label from the post-`filter` index (`i+1`) of the hitPoints array, not the turn's real `turnIndex`. The dot's x-position (p.x, captured pre-filter) and the aggregate cold-miss count are correct; only the hover label is wrong, and only when one or more null (non-SDK) turns are interspersed before a known turn. Fix: carry `turnIndex` into each hitPoints object and use it in the <title>. Add a regression test: a series like [null, cold] must show the cold dot's tooltip as the SECOND turn, not 'T1'. Affects sidequest-ui/src/components/Dashboard/charts/TokenBarChart.tsx + telemetryAdapter-cache-join/TokenBarChart-cache-split tests."
    points: 1
    priority: p3
    status: in-progress
    repos: ui
    workflow: tdd
    type: bug
    branch: "feat/125-1-inspector-cache-chart-fixes"
  - id: 125-2
    title: "Inspector token chart: visible 'cache: n/a' caption for all-non-SDK sessions (not hover-only)"
    description: "From the 124-1 Reviewer audit (via silent-failure-hunter). When every turn in a session is cacheState 'null' (all non-SDK, e.g. Ollama/claude-p), the 'served from cache' summary line is suppressed (TokenBarChart.tsx:149) and the only 'n/a' rendered is inside per-bar SVG <title> tooltips (hover-only, TokenBarChart.tsx:93). A GM can't tell cache data is ABSENT vs zero without hovering. Add a visible 'cache: n/a (non-SDK)' caption for the all-null case. AC-4's no-fabrication is already met — this is a legibility enhancement, NOT a correctness fix. Test: an all-null series renders a visible (non-title) n/a caption; a series with >=1 known turn renders the savings line instead. Affects sidequest-ui/src/components/Dashboard/charts/TokenBarChart.tsx."
    points: 1
    priority: p3
    status: backlog
    repos: ui
    workflow: tdd
    type: chore
  - id: 125-3
    title: "Inspector cache join: surface malformed cache_usage instead of silently folding to 'null'"
    description: "From the 124-1 Reviewer audit (via silent-failure-hunter). buildTurnTokenCacheRows (telemetryAdapter.ts) folds a MALFORMED cache_usage (a present dict whose cache_read is absent/non-numeric) into the same 'null' bucket as a genuinely-absent cache_usage — masking server schema-drift as a benign 'non-SDK' turn (a No-Silent-Fallbacks concern). The current server contract guarantees cache_read is an int whenever the dict is present (test_prompt_cache_attribution_otel.py), so the realistic surface is nil TODAY — defensive hardening. Surface the anomaly: either a console.warn or a distinct 'malformed' cacheState (implementer's choice; avoid noisy prod logging). Test: a prompt_assembled with cache_usage={cache_write:500} (no cache_read) is flagged/warned, not silently treated as non-SDK. Affects sidequest-ui/src/components/Dashboard/source/telemetryAdapter.ts."
    points: 1
    priority: p3
    status: backlog
    repos: ui
    workflow: trivial
    type: chore
  - id: 125-4
    title: "F3g follow-up (118-7): animate the FateDiceTray 3D Fudge dice to the rolled faces (throw_params/seed) + align the dF blank-face label to '0'"
    description: |-
      Deferred from story 118-7 (ADR-144 F3g) — captured by TEA + Dev + Reviewer as non-blocking findings. Two coupled changes that together make the FateDiceTray's 3D Fudge dice show the ACTUAL rolled faces:

      (AC5 — the substantive half) Carry throw_params + seed on the FATE_ROLL message/payload (mirroring DICE_RESULT) so the 3D dice in FateDiceTray animate to the rolled faces instead of rendering the idle pickup row (throwParams=null). Touches: sidequest-server FateRollPayload (protocol/models.py) + build_fate_roll_payload (game/ruleset/fate_projection.py) to emit throw_params/seed; sidequest-ui FateDiceTray.tsx to pass throwParams through to DiceScene. NOTE: FateRollPayload is model_config extra='forbid' — adding fields is a deliberate protocol change.

      (AC4 — the 1-line coupled half) Align the dF die's blank-face label to '0'. The UI text readout already renders faceGlyph(0)='0' (pinned by a test in 118-7); the dice-lib die still labels its two blank Fudge faces '' (../dice-lib/src/dF.ts:22-23). Change those labels '' -> '0' so the 3D die and the text readout agree once the dice show real faces. Touches: ../dice-lib/src/dF.ts (+ a dice-lib test). Not player-visible until AC5 lands (dice are decorative/idle today), which is why they're bundled.

      Player-UI legibility mandate (Sebastien/Jade): the dice should show what was actually rolled. See 118-7 session archive (sprint/archive/118-7-session.md) Delivery Findings — TEA (test design) + Reviewer (code review).
    points: 3
    priority: p3
    status: backlog
    repos: dice-lib,server,ui
    workflow: tdd
  - id: 125-5
    title: 'Harden the FATE_ROLL boundary guard (118-7): validate Fudge face values in {-1,0,1}, not just dice-tuple length'
    description: "Deferred from story 118-7 (ADR-144 F3g) — flagged independently by the Reviewer's own analysis AND the reviewer-security subagent as a defense-in-depth gap (NOT a security vulnerability). The useStateMirror FATE_ROLL boundary guard (sidequest-ui/src/hooks/useStateMirror.ts) validates that p.dice is a 4-element array (!Array.isArray(p.dice) || p.dice.length !== 4) but does NOT validate that each face is in {-1,0,1}. A corrupted/replayed payload with valid-length but out-of-range faces renders a wrong glyph (FateDiceTray.faceGlyph degrades any out-of-range value to '0') — it cannot crash, exfiltrate, or escalate, and the server always emits valid faces via build_fate_roll_payload, so the realistic surface is nil today. Optional hardening: tighten the guard to also require p.dice.every(d => d === -1 || d === 0 || d === 1), dropping (console.error) a malformed roll the same way the missing-dice case is dropped. Add a regression test: a roll with a face of 2 (or -5) is rejected, not stored. Affects sidequest-ui/src/hooks/useStateMirror.ts (FATE_ROLL branch). See sprint/archive/118-7-session.md Delivery Findings — Reviewer (code review)."
    points: 1
    priority: p3
    status: backlog
    repos: ui
    workflow: trivial
    type: chore
  - id: 125-6
    title: 'Fate UI payload-boundary hardening (118-2 review): clamp free_invokes before Array.from + exclude fateState from sessionStorage'
    description: "Two non-blocking defense-in-depth findings CONFIRMED in the 118-2 (F3b Fate panel) Reviewer pass that were never filed — orphaned until the 2026-06-16 Fate deferred-cleanup triage. Bundled here per the 118-8/118-9 'file a single follow-up story bundling related hardening' precedent. Both are FATE_STATE payload-trust gaps in the Fate UI; neither is a live exploit (server emits valid payloads via build_fate_projection), so this is hardening, not a fix. SOURCE: sprint/archive/118-2-session.md Reviewer findings (reviewer-security). (1) [MEDIUM][SEC] free_invokes is unclamped at FatePanel.tsx:104 — Array.from({ length: a.free_invokes }) — a malformed payload with a huge/Infinity free_invokes passes the array-only boundary guard and allocates a pathological array (browser-tab DoS). (2) [LOW][SEC] sessionStorage hydration bypass — fateState is persisted to sessionStorage and rehydrated on reload PAST the malformed-payload boundary guard, so a once-malformed payload survives a refresh. NOT covered by 125-5 (which guards the FATE_ROLL dice tuple in useStateMirror — a different message/field/file)."
    points: 2
    priority: p3
    status: backlog
    repos: ui
    workflow: tdd
    acceptance_criteria:
      - "free_invokes clamp: at FatePanel.tsx:104 bound the pip count before Array.from (e.g. Math.min(a.free_invokes ?? 0, N) with a sane N), so a huge/Infinity/NaN free_invokes cannot allocate a pathological array. Regression test: a fateState payload with free_invokes=1e9 (and Infinity) renders a bounded pip count without hanging — closes the 118-2 'no test for free_invokes' gap."
      - 'sessionStorage exclusion: exclude fateState from the sessionStorage hydration path (GameStateProvider/useStateMirror) so a malformed payload cannot bypass the FATE_STATE boundary guard on reload. Regression test: a malformed fateState written to sessionStorage is NOT rehydrated into live state on mount (it re-enters only via a fresh FATE_STATE message through the guard).'
    type: bug
