  - id: 125-3
    title: "Inspector cache join: surface malformed cache_usage instead of silently folding to 'null'"
    description: "From the 124-1 Reviewer audit (via silent-failure-hunter). buildTurnTokenCacheRows (telemetryAdapter.ts) folds a MALFORMED cache_usage (a present dict whose cache_read is absent/non-numeric) into the same 'null' bucket as a genuinely-absent cache_usage — masking server schema-drift as a benign 'non-SDK' turn (a No-Silent-Fallbacks concern). The current server contract guarantees cache_read is an int whenever the dict is present (test_prompt_cache_attribution_otel.py), so the realistic surface is nil TODAY — defensive hardening. Surface the anomaly: either a console.warn or a distinct 'malformed' cacheState (implementer's choice; avoid noisy prod logging). Test: a prompt_assembled with cache_usage={cache_write:500} (no cache_read) is flagged/warned, not silently treated as non-SDK. Affects sidequest-ui/src/components/Dashboard/source/telemetryAdapter.ts."
    points: 1
