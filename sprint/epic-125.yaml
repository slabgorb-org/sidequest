  - id: 125-5
    title: 'Harden the FATE_ROLL boundary guard (118-7): validate Fudge face values in {-1,0,1}, not just dice-tuple length'
    description: "Deferred from story 118-7 (ADR-144 F3g) — flagged independently by the Reviewer's own analysis AND the reviewer-security subagent as a defense-in-depth gap (NOT a security vulnerability). The useStateMirror FATE_ROLL boundary guard (sidequest-ui/src/hooks/useStateMirror.ts) validates that p.dice is a 4-element array (!Array.isArray(p.dice) || p.dice.length !== 4) but does NOT validate that each face is in {-1,0,1}. A corrupted/replayed payload with valid-length but out-of-range faces renders a wrong glyph (FateDiceTray.faceGlyph degrades any out-of-range value to '0') — it cannot crash, exfiltrate, or escalate, and the server always emits valid faces via build_fate_roll_payload, so the realistic surface is nil today. Optional hardening: tighten the guard to also require p.dice.every(d => d === -1 || d === 0 || d === 1), dropping (console.error) a malformed roll the same way the missing-dice case is dropped. Add a regression test: a roll with a face of 2 (or -5) is rejected, not stored. Affects sidequest-ui/src/hooks/useStateMirror.ts (FATE_ROLL branch). See sprint/archive/118-7-session.md Delivery Findings — Reviewer (code review)."
    points: 1
    priority: p3
    status: done
    started: '2026-06-17'
    repos: ui
    workflow: trivial
    completed: '2026-06-17'
    type: chore
    review_verdict: approved
  - id: 125-6
    title: 'Fate UI payload-boundary hardening (118-2 review): clamp free_invokes before Array.from + exclude fateState from sessionStorage'
    description: "Two non-blocking defense-in-depth findings CONFIRMED in the 118-2 (F3b Fate panel) Reviewer pass that were never filed — orphaned until the 2026-06-16 Fate deferred-cleanup triage. Bundled here per the 118-8/118-9 'file a single follow-up story bundling related hardening' precedent. Both are FATE_STATE payload-trust gaps in the Fate UI; neither is a live exploit (server emits valid payloads via build_fate_projection), so this is hardening, not a fix. SOURCE: sprint/archive/118-2-session.md Reviewer findings (reviewer-security). (1) [MEDIUM][SEC] free_invokes is unclamped at FatePanel.tsx:104 — Array.from({ length: a.free_invokes }) — a malformed payload with a huge/Infinity free_invokes passes the array-only boundary guard and allocates a pathological array (browser-tab DoS). (2) [LOW][SEC] sessionStorage hydration bypass — fateState is persisted to sessionStorage and rehydrated on reload PAST the malformed-payload boundary guard, so a once-malformed payload survives a refresh. NOT covered by 125-5 (which guards the FATE_ROLL dice tuple in useStateMirror — a different message/field/file)."
    points: 2
    priority: p3
    status: backlog
    repos: ui
    workflow: tdd
    acceptance_criteria:
      - "free_invokes clamp: at FatePanel.tsx:104 bound the pip count before Array.from (e.g. Math.min(a.free_invokes ?? 0, N) with a sane N), so a huge/Infinity/NaN free_invokes cannot allocate a pathological array. Regression test: a fateState payload with free_invokes=1e9 (and Infinity) renders a bounded pip count without hanging — closes the 118-2 'no test for free_invokes' gap."
      - 'sessionStorage exclusion: exclude fateState from the sessionStorage hydration path (GameStateProvider/useStateMirror) so a malformed payload cannot bypass the FATE_STATE boundary guard on reload. Regression test: a malformed fateState written to sessionStorage is NOT rehydrated into live state on mount (it re-enters only via a fresh FATE_STATE message through the guard).'
    type: bug
  - id: 125-7
    title: emitters.py C2-transaction comment says 'sqlite rolls back' — stale post-ADR-115 (Postgres); rename to the PgSaveRepository transaction semantics
    description: "From the 127-7 completeness-audit sweep (epic-127) — flagged as a carried, out-of-tech-writer-lane source-code follow-up. sidequest-server/sidequest/server/emitters.py lines 502-507 (the C2 single-transaction block in the event-append/cache-write path) document crash-recovery as 'If the server crashes mid-block, sqlite rolls back both the event row and any partial cache rows'. Post-ADR-115 (SQLite-per-session -> PostgreSQL) the block runs on Postgres via repo.transaction() (PgSaveRepository), so the engine name is wrong. The transactional BEHAVIOR is correct and unchanged (atomic event + projection-cache write or nothing) — this is a COMMENT-ONLY fix: replace 'sqlite rolls back' with the Postgres/PgSaveRepository transaction semantics (e.g. 'the transaction rolls back'). No code/logic change, no test change. Caught by tech-writer in 127-7 but deferred because it is source code, not docs."
    points: 1
    priority: p3
    status: backlog
    repos: server
    workflow: trivial
    type: chore
  - id: 125-8
    title: '[TEST DEBT] Restore the WWN/WN-combat test suite after 108-3 de-nativization — ~88 stale tests send stripped combat beats'
    description: "Surfaced during story 126-37 (Fate resolution de-nativization), green phase, 2026-06-20. A full sidequest-server suite run shows ~88 failures + 3 errors across ~34 files, ALL in the WWN/WN-combat area (tests/integration/test_102_4_wn_*, test_106_2_wwn_*, test_108_*, test_wwn_*, test_class_signature_wiring, test_cc_chargen_e2e, test_dice_path_spell_cast_102_2, test_barsoom_cast_beat_live_content, genre/test_heavy_metal_loads_wwn_classes, etc.). Root cause: epic-108's WWN combat de-nativization (content commit 34612bf '108-3 strip native beats', 2026-06-15) removed the native combat beats (strike/brace/break_contact/committed_blow/cast_spell/...) from WWN combat confrontation pools — the WN round (wn_round.py / dice.py 108-8 transient-beat intercept) now supplies the action set (only 'attack' is a recognized WN action beat via is_wn_action_beat). The tests were NOT updated: they still send stripped beat ids, so they fail-loud at either the loader (_validate_class_filter_refs PackError 'references beat id(s) [...] not in pool', loader.py:900) or dispatch (DiceDispatchError 'unknown beat_id committed_blow ... available: []', dice.py:420). These are PRE-EXISTING on origin/develop (the failing code + stale tests predate the 126-37 branch's merge-base e93b4084) — i.e. the WWN-combat suite has been red since ~108-3 landed while epic 108 is in flight (ADR-143/114 'partial', WN-owns-the-round work ongoing). NOT caused by 126-37 (whose 8 tests + 3 fate_conflict-gated guards are all green). One instance was already fixed under 126-37 as a courtesy (tests/genre/test_classes_yaml_loader.py — synthetic classes.yaml hardcoded [strike,brace,break_contact]; changed to [] which the loader exempts for WN classes per 108-7); use it as the reference pattern. WARNING: not all are trivial data swaps — many assert real WN-round behavior (sealed-commit order, reprisal, initiative, shock-kill) and need the test driven through the synthesized WN action set, which may overlap with active epic-108 work; coordinate before sweeping. Recommend its own branch, not a 126-37 follow-on."
    points: 5
    priority: p2
    status: backlog
    repos: server
    workflow: tdd
    acceptance_criteria:
      - 'Full sidequest-server suite (uv run pytest) is green: 0 failures, 0 errors in the WWN/WN-combat files (or any remaining red is documented as genuinely-blocked-on-unshipped-epic-108-behavior, with a loud skip + linked story, never a silent xfail).'
      - Each fixed test exercises the CURRENT de-nativized WN combat path (synthesized WN action beats via is_wn_action_beat / wn_action_beat, or empty encounter_beat_choices for WN classes) — not a trivial assertion-weakening to force green.
      - No production code changed unless a genuine wiring gap is found; this is test-debt cleanup. Any production change is logged as a Delivery Finding and re-scoped.
      - Coordinated with in-flight epic-108 WN-round work so the fixes don't collide with or pre-empt that story's own test updates.
    type: chore
